<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fluency Sprint</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #64748b;
      --line: #d7deea;
      --paper: #fffdf7;
      --panel: #ffffff;
      --teal: #0f9f8f;
      --teal-dark: #087b70;
      --coral: #f05d4f;
      --coral-dark: #c43f34;
      --gold: #f4b63d;
      --green: #46a758;
      --blue: #3c75d8;
      --shadow: 0 18px 42px rgba(23, 32, 51, 0.12);
      --radius: 8px;
      --body-bg:
        radial-gradient(circle at top left, rgba(244, 182, 61, 0.22), transparent 32rem),
        linear-gradient(135deg, #fffaf0 0%, #f7fbff 52%, #fff7f5 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--body-bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body[data-theme="ocean"] {
      --ink: #0e2a3b;
      --muted: #496776;
      --line: #b9d8e6;
      --teal: #007f95;
      --teal-dark: #005d70;
      --coral: #e76f51;
      --coral-dark: #b84c32;
      --gold: #f2c94c;
      --body-bg:
        radial-gradient(circle at top left, rgba(0, 127, 149, 0.2), transparent 30rem),
        linear-gradient(135deg, #eefcff 0%, #f8fbff 50%, #fff7ed 100%);
    }

    body[data-theme="forest"] {
      --ink: #173122;
      --muted: #52695c;
      --line: #c7dccd;
      --teal: #2f855a;
      --teal-dark: #276749;
      --coral: #c05621;
      --coral-dark: #9c4221;
      --gold: #ecc94b;
      --body-bg:
        radial-gradient(circle at top left, rgba(72, 187, 120, 0.2), transparent 30rem),
        linear-gradient(135deg, #f0fff4 0%, #f7fafc 52%, #fffaf0 100%);
    }

    body[data-theme="sunset"] {
      --ink: #332018;
      --muted: #755c51;
      --line: #ead1c5;
      --teal: #1f8a8a;
      --teal-dark: #146a6a;
      --coral: #d94f4f;
      --coral-dark: #a93a3a;
      --gold: #f6ad55;
      --body-bg:
        radial-gradient(circle at top left, rgba(246, 173, 85, 0.24), transparent 30rem),
        linear-gradient(135deg, #fff7ed 0%, #fff5f5 50%, #eefcff 100%);
    }

    body[data-theme="bright"] {
      --ink: #182136;
      --muted: #56627a;
      --line: #cfd8ff;
      --teal: #0f9f8f;
      --teal-dark: #087b70;
      --coral: #ef476f;
      --coral-dark: #b83257;
      --gold: #ffd166;
      --body-bg:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.28), transparent 30rem),
        linear-gradient(135deg, #fffdf7 0%, #f0fbff 45%, #fff0f6 100%);
    }

    body[data-theme="contrast"] {
      --ink: #05070d;
      --muted: #182033;
      --line: #05070d;
      --teal: #005fcc;
      --teal-dark: #003f88;
      --coral: #b00020;
      --coral-dark: #7a0015;
      --gold: #f5b700;
      --green: #006b3d;
      --blue: #003fbd;
      --shadow: none;
      --body-bg: #ffffff;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    a {
      color: inherit;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 3vw, 2rem);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .brand-mark {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 8px;
      background: var(--teal);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(15, 159, 143, 0.25);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1rem 0 3rem;
    }

    .hero {
      text-align: center;
      padding: clamp(1.5rem, 5vw, 4rem) 0 2rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0.75rem;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.05;
      margin-bottom: 0.6rem;
    }

    h3 {
      margin-bottom: 0.4rem;
      font-size: 1.1rem;
    }

    .lead {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 42rem;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .tile {
      width: 100%;
      min-height: 11rem;
      padding: 1.25rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      text-align: left;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      touch-action: manipulation;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      border-color: var(--teal);
      box-shadow: 0 14px 28px rgba(23, 32, 51, 0.12);
      outline: none;
    }

    .iconbox {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 8px;
      display: grid;
      place-items: center;
      margin-bottom: 0.9rem;
      background: #e8fbf8;
      color: var(--teal-dark);
      font-size: 1.35rem;
      font-weight: 900;
    }

    .tile:nth-child(2) .iconbox {
      background: #fff0ec;
      color: var(--coral-dark);
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 0.86rem;
    }

    .tiny {
      font-size: 0.76rem;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .section {
      padding: 1.1rem;
    }

    .btn {
      min-height: 2.75rem;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 0.65rem 0.95rem;
      background: var(--ink);
      color: white;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      text-decoration: none;
    }

    .btn.primary {
      background: var(--teal);
      color: white;
    }

    .btn.warn {
      background: var(--coral);
      color: white;
    }

    .btn.gold {
      background: var(--gold);
      color: #3b2d04;
    }

    .btn.ghost {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }

    .btn.icon {
      width: 2.65rem;
      padding: 0;
      flex: 0 0 auto;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 2rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .proficiency {
      display: inline-flex;
      align-items: center;
      min-height: 1.9rem;
      padding: 0.3rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .proficiency.secure {
      border-color: #b6e4bd;
      background: #ecfff0;
      color: #215b2b;
    }

    .proficiency.building {
      border-color: #f3d28b;
      background: #fff8df;
      color: #5f4608;
    }

    .proficiency.nearly {
      border-color: #b9d6ff;
      background: #eef6ff;
      color: #214e83;
    }

    .proficiency.focus {
      border-color: #ffc7bd;
      background: #fff1ef;
      color: #84251d;
    }

    .proficiency.none {
      border-color: #d7deea;
      background: #f8fafc;
      color: #64748b;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .tab {
      border: 2px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      padding: 0.55rem 0.85rem;
      font-weight: 900;
      min-height: 2.75rem;
      touch-action: manipulation;
    }

    .tab.active {
      border-color: var(--teal);
      background: #e8fbf8;
      color: var(--teal-dark);
    }

    .appearance-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .appearance-choice {
      min-height: 5.25rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 0.75rem;
      display: grid;
      grid-template-columns: 2.4rem minmax(0, 1fr);
      align-items: center;
      gap: 0.7rem;
      text-align: left;
      font-weight: 900;
    }

    .appearance-choice.active {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(15, 159, 143, 0.12);
    }

    body[data-theme="contrast"] .tab.active,
    body[data-theme="contrast"] .appearance-choice.active {
      background: var(--ink);
      color: white;
      box-shadow: none;
    }

    .swatch {
      width: 2.35rem;
      height: 2.35rem;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: linear-gradient(135deg, #0f9f8f 0 50%, #f4b63d 50% 100%);
    }

    .swatch.ocean {
      background: linear-gradient(135deg, #007f95 0 50%, #f2c94c 50% 100%);
    }

    .swatch.forest {
      background: linear-gradient(135deg, #2f855a 0 50%, #c05621 50% 100%);
    }

    .swatch.sunset {
      background: linear-gradient(135deg, #d94f4f 0 50%, #f6ad55 50% 100%);
    }

    .swatch.bright {
      background: linear-gradient(135deg, #ef476f 0 50%, #ffd166 50% 100%);
    }

    .swatch.contrast {
      background: linear-gradient(135deg, #05070d 0 50%, #ffffff 50% 100%);
    }

    .table-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(4.6rem, 1fr));
      gap: 0.55rem;
    }

    .check-choice {
      min-height: 3.25rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 0.6rem 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .check-choice input {
      width: 1.25rem;
      min-height: 1.25rem;
      accent-color: var(--teal);
      flex: 0 0 auto;
    }

    .check-choice.active {
      border-color: var(--teal);
      background: #e8fbf8;
      color: var(--teal-dark);
    }

    body[data-theme="contrast"] .check-choice.active {
      background: var(--ink);
      color: white;
    }

    label {
      display: grid;
      gap: 0.35rem;
      color: var(--ink);
      font-weight: 850;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 3rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0.65rem 0.75rem;
      outline: none;
    }

    textarea {
      min-height: 9rem;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(15, 159, 143, 0.12);
    }

    .notice {
      border: 2px solid #f3d28b;
      background: #fff8df;
      color: #5f4608;
      border-radius: var(--radius);
      padding: 0.8rem;
    }

    .guide-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .guide-card {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      padding: 1rem;
      min-height: 9rem;
    }

    .guide-card h3 {
      margin-bottom: 0.45rem;
    }

    .guide-list {
      display: grid;
      gap: 0.45rem;
      margin: 0;
      padding-left: 1.15rem;
    }

    .example-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .example-box {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      padding: 0.85rem;
      font-size: 1.2rem;
      font-weight: 950;
      text-align: center;
    }

    .success {
      border-color: #b6e4bd;
      background: #ecfff0;
      color: #215b2b;
    }

    .danger {
      border-color: #ffc7bd;
      background: #fff1ef;
      color: #84251d;
    }

    .level-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .level {
      min-height: 5.6rem;
      border: 2px solid var(--line);
      background: white;
      border-radius: var(--radius);
      padding: 0.85rem;
      text-align: left;
      touch-action: manipulation;
    }

    .level.active {
      border-color: var(--coral);
      box-shadow: 0 0 0 4px rgba(240, 93, 79, 0.12);
    }

    .level.locked {
      opacity: 0.62;
      background: #f8fafc;
    }

    .level-code {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 900;
    }

    .ladder {
      display: grid;
      gap: 0.65rem;
    }

    .ladder-step {
      position: relative;
      display: grid;
      grid-template-columns: 2.6rem minmax(0, 1fr) auto;
      gap: 0.7rem;
      align-items: center;
      min-height: 5.2rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      padding: 0.75rem;
      text-align: left;
    }

    .ladder-step.active {
      border-color: var(--coral);
      box-shadow: 0 0 0 4px rgba(240, 93, 79, 0.12);
    }

    .ladder-step.locked {
      opacity: 0.62;
      background: #f8fafc;
    }

    .step-rung {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: #e8fbf8;
      color: var(--teal-dark);
      font-weight: 950;
    }

    .reward-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.9rem;
      align-items: center;
    }

    .avatar-badge {
      width: 4.25rem;
      height: 4.25rem;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--teal);
      color: white;
      font-size: 1.8rem;
      font-weight: 950;
      box-shadow: var(--shadow);
    }

    .coach-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.9rem;
      align-items: start;
    }

    .coach-avatar {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #ffe8d5;
      color: #7a3412;
      border: 2px solid #fed7aa;
      font-weight: 950;
      box-shadow: var(--shadow);
    }

    .coach-copy {
      gap: 0.45rem;
    }

    .reward-shop {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .practice-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(18rem, 24rem);
      gap: 1rem;
      align-items: start;
    }

    .question {
      text-align: center;
      padding: clamp(1.2rem, 4vw, 2.5rem);
      position: relative;
      overflow: visible;
    }

    .question-text {
      font-size: clamp(3.2rem, 11vw, 7.4rem);
      font-weight: 950;
      line-height: 1;
      margin: 1rem 0;
      letter-spacing: 0;
    }

    .answer-input {
      font-size: clamp(2rem, 8vw, 4rem);
      text-align: center;
      font-weight: 950;
      min-height: 5rem;
      max-width: 18rem;
      margin: 0 auto;
      touch-action: manipulation;
      caret-color: transparent;
      pointer-events: none;
    }

    .feedback-toast {
      position: absolute;
      left: 50%;
      bottom: 0.75rem;
      transform: translateX(-50%);
      width: min(92%, 24rem);
      z-index: 4;
      margin: 0;
      box-shadow: 0 12px 26px rgba(23, 32, 51, 0.14);
      pointer-events: none;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
      user-select: none;
      -webkit-user-select: none;
    }

    .key {
      min-height: 4.8rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: white;
      font-size: 1.55rem;
      font-weight: 950;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .student-shell {
      padding-top: 0.75rem;
    }

    .student-join-card {
      max-width: 44rem;
      margin: 0 auto;
      width: 100%;
    }

    .student-menu-panel {
      gap: 1.15rem;
    }

    .action-row .btn {
      flex: 1 1 13rem;
    }

    .session-shell {
      padding-bottom: 1.25rem;
      padding-bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
    }

    .session-practice {
      align-items: stretch;
    }

    .session-practice .question,
    .keypad-panel {
      height: 100%;
    }

    .keypad-panel {
      justify-content: start;
    }

    .result-actions .tile {
      min-height: 8.5rem;
    }

    .key.enter {
      grid-column: span 3;
      background: var(--teal);
      color: white;
      border-color: var(--teal);
    }

    body[data-keypad-size="large"] .answer-input {
      min-height: 5.8rem;
      max-width: 22rem;
    }

    body[data-keypad-size="large"] .keypad {
      gap: 0.85rem;
    }

    body[data-keypad-size="large"] .key {
      min-height: 5.8rem;
      font-size: 1.85rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .stat {
      padding: 0.8rem;
      border: 2px solid var(--line);
      background: white;
      border-radius: var(--radius);
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 0.7rem;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #f7fafc;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(15rem, 22rem) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .class-list {
      display: grid;
      gap: 0.55rem;
    }

    .class-button {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      text-align: left;
      padding: 0.75rem;
    }

      async function initializeBackend() {
        if (!supabaseClient) return;
        var response = await supabaseClient.auth.getUser();
        if (response.data && response.data.user) {
          state.remoteTeacher = {
            id: response.data.user.id,
            email: response.data.user.email,
            displayName: response.data.user.user_metadata && response.data.user.user_metadata.display_name
              ? response.data.user.user_metadata.display_name
              : "Teacher"
          };
          await ensureRemoteProfile(state.remoteTeacher.displayName);
          await loadRemoteDashboard();
        }
        state.backendReady = true;
        render();

      async function ensureRemoteProfile(displayName) {
        if (!backendActive()) return;
        var result = await supabaseClient.rpc("ensure_teacher_profile", {
          p_display_name: displayName || "Teacher"
        });
        if (result.error) {
          throw result.error;
        }
        if (result.data) {
          state.remoteTeacher.displayName = result.data.display_name || state.remoteTeacher.displayName;
        }
      }

      async function loadRemoteDashboard() {
        if (!backendActive()) return;
        var classesResult = await supabaseClient
          .from("classes")
          .select("*")
          .is("deleted_at", null)
          .order("created_at", { ascending: true });
        if (classesResult.error) throw classesResult.error;
        state.remoteClasses = (classesResult.data || []).map(normalizeClass);

        var classIds = state.remoteClasses.map(function (item) { return item.id; });
        if (!state.dashboardClassId && state.remoteClasses.length) {
          state.dashboardClassId = state.remoteClasses[0].id;
        }

        if (!classIds.length) {
          state.remoteStudents = [];
          state.remoteSessions = [];
          return;
        }

        var studentsResult = await supabaseClient
          .from("students")
          .select("id,class_id,teacher_id,first_name,last_name,alias,year_level,created_at,deleted_at")
          .in("class_id", classIds)
          .is("deleted_at", null)
          .order("created_at", { ascending: true });
        if (studentsResult.error) throw studentsResult.error;
        state.remoteStudents = (studentsResult.data || []).map(normalizeStudent);

        var sessionsResult = await supabaseClient
          .from("sessions")
          .select("*, mistakes(*)")
          .in("class_id", classIds)
          .order("created_at", { ascending: false })
          .limit(300);
        if (sessionsResult.error) throw sessionsResult.error;
        state.remoteSessions = (sessionsResult.data || []).map(normalizeSession);
      }

      async function loadRemoteStudentHistory() {
        if (!backendActive() || !state.student || !state.student.accessToken) return;
        state.studentHistoryError = "";
        var result = await supabaseClient.rpc("student_session_history", {
          p_student_id: state.student.id,
          p_access_token: state.student.accessToken
        });
        if (result.error) {
          state.studentHistoryError = result.error.message;
          return;
        }
        var studentSessions = (result.data || []).map(normalizeSession);
        state.remoteSessions = state.remoteSessions.filter(function (session) {
          return session.studentId !== state.student.id;
        }).concat(studentSessions);
      }

      async function remoteTeacherSignup(displayName, email, password) {
        var result = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: {
            emailRedirectTo: appPublicUrl(),
            data: {
              display_name: displayName || "Teacher"

          }

        } : null;

      function normalizeTables(tables) {

        });
      }

      function normalizeYearLevel(value) {

      function yearLevelOrder(value) {
        var id = normalizeYearLevel(value);
        var level = YEAR_LEVELS.find(function (item) { return item.id === id; });

      }

      function yearLevelGuide(value) {

        return YEAR_LEVEL_SKILL_GUIDE[id] || YEAR_LEVEL_SKILL_GUIDE.Y4;
      }

      function levelAccessYear(levelId) {
        return LEVEL_ACCESS_YEAR[levelId] == null ? 4 : LEVEL_ACCESS_YEAR[levelId];
      }

      function focusLevelIdsForYear(value) {
        var guide = yearLevelGuide(value);
        return (guide.focus || []).filter(function (levelId) {
          return LEVELS.some(function (level) { return level.id === levelId; });
        });
      }

      function availableLevelIdsForYear(value) {
        var maxYear = yearLevelOrder(value);
        return LEVELS.filter(function (level) {
          return levelAccessYear(level.id) <= maxYear;
        }).map(function (level) {
          return level.id;
        });

      function currentStudentRecord() {
        if (!state.student) return null;
        var remote = state.remoteStudents.find(function (student) { return student.id === state.student.id; });
        var local = store.students.find(function (student) { return student.id === state.student.id; });
        return Object.assign({}, local || {}, remote || {}, state.student);
      }

      function studentPathwayYearOrder(student) {
        var record = student || currentStudentRecord();
        return yearLevelOrder(record && record.yearLevel);
      }

      function diagnosticStartYear(student) {
        var order = studentPathwayYearOrder(student);
        return order <= 1 ? 0 : Math.max(0, order - 1);
      }

      function pathwayLevelsForOperation(operation) {
        return LEVELS.filter(function (level) {
          return level.operation === operation;
        }).sort(function (a, b) {
          var accessDiff = levelAccessYear(a.id) - levelAccessYear(b.id);
          if (accessDiff) return accessDiff;
          return LEVELS.indexOf(a) - LEVELS.indexOf(b);
        });
      }

      function pathwayStageIndex(levelId) {
        var level = levelById(levelId);
        var pathway = pathwayLevelsForOperation(level.operation);
        var index = pathway.findIndex(function (item) { return item.id === level.id; });
        return index < 0 ? 0 : index;
      }

      function studentLevelStageLabel(level) {
        return "Stage " + (pathwayStageIndex(level.id) + 1);
      }

      function diagnosticStartLevelForOperation(student, operation) {
        var pathway = pathwayLevelsForOperation(operation);
        if (!pathway.length) return null;
        var targetYear = diagnosticStartYear(student);
        var index = pathway.findIndex(function (level) {
          return levelAccessYear(level.id) >= targetYear;
        });
        return pathway[index < 0 ? pathway.length - 1 : index];
      }

      function diagnosticStartIndexForOperation(student, operation) {
        var pathway = pathwayLevelsForOperation(operation);
        var start = diagnosticStartLevelForOperation(student, operation);
        return start ? pathway.findIndex(function (level) { return level.id === start.id; }) : 0;
      }

      function sprintUnlockInfo(student, level) {
        var record = student || currentStudentRecord();
        if (!record) return { unlocked: true, reason: "practiceChoice", label: "Open" };
        var pathway = pathwayLevelsForOperation(level.operation);
        var index = pathway.findIndex(function (item) { return item.id === level.id; });
        if (index < 0) return { unlocked: true, reason: "open", label: "Open" };
        var profile = proficiencyForStudentLevel(record.id, level.id);
        if (profile.sessions > 0) return { unlocked: true, reason: "retry", label: progressSignal(profile) };
        var startIndex = diagnosticStartIndexForOperation(record, level.operation);
        if (index === startIndex) return { unlocked: true, reason: "diagnosticStart", label: "Diagnostic start" };
        if (index > 0) {
          var previous = proficiencyForStudentLevel(record.id, pathway[index - 1].id);
          if (previous.status === "secure") return { unlocked: true, reason: "previousSecure", label: "Unlocked" };
          if (levelHasDiagnosticPass(record.id, pathway[index - 1].id)) return { unlocked: true, reason: "diagnosticPass", label: "Challenge unlocked" };
        }
        if (index < startIndex && pathway[index + 1]) {
          var next = proficiencyForStudentLevel(record.id, pathway[index + 1].id);
          if ((next.sessions > 0 || levelHasSprintAttempt(record.id, pathway[index + 1].id)) && next.status !== "secure") return { unlocked: true, reason: "supportStep", label: "Support step" };
        }
        return { unlocked: false, reason: "locked", label: "Locked" };
      }

      function sprintDiagnosticPass(session) {
        return !!session && session.mode === "sprint" && Number(session.attempted) >= 10 && Number(session.accuracy) >= 85;
      }

      function levelHasDiagnosticPass(studentId, levelId) {
        if (state.results && state.results.studentId === studentId && state.results.levelId === levelId && sprintDiagnosticPass(state.results)) return true;
        return sessionsForChallenge(studentId, levelId).some(sprintDiagnosticPass);
      }

      function levelHasSprintAttempt(studentId, levelId) {
        if (state.results && state.results.studentId === studentId && state.results.levelId === levelId && state.results.mode === "sprint") return true;
        return sessionsForChallenge(studentId, levelId).some(function (session) {
          return session.mode === "sprint";
        });
      }

      function diagnosticFollowUp(session) {
        if (!state.student || !session || session.mode !== "sprint") return null;
        var level = levelById(session.levelId);
        if (!level) return null;
        var pathway = pathwayLevelsForOperation(level.operation);
        var index = pathway.findIndex(function (item) { return item.id === level.id; });
        if (index < 0) return null;
        if (sprintDiagnosticPass(session)) {
          if (pathway[index + 1]) {
            return {
              level: pathway[index + 1],
              title: "Next sprint unlocked",
              body: "Strong sprint. Try the next stage in the climb.",
              action: "Continue climb"
            };
          }
          return {
            level: null,
            title: "Top of this climb",
            body: "This pathway is looking strong. Choose another operation when you are ready.",
            action: ""
          };
        }
        if (pathway[index - 1]) {
          return {
            level: pathway[index - 1],
            title: "Support step ready",
            body: "This earlier stage can help make the next sprint easier.",
            action: "Try support sprint"
          };
        }
        return {
          level: level,
          title: "Keep building",
          body: "Practise this stage, then try the sprint again.",
          action: "Retry sprint"
        };
      }

      function coachAdviceForStudent(level) {

        var profile = proficiencyForStudentLevel(student.id, level.id);
        var unlock = sprintUnlockInfo(student, level);
        if (!allSessions.length) {
          return {

        if (profile.status === "nearlySecure" || profile.improving) {

        if (profile.status === "notStarted") {

            title: "Guide coach",
            kicker: "Ready",
            body: "This skill has no saved attempts yet. A short practice round gives you a clean start.",
            action: "Start fluency practice before a sprint."

        }
        return {
          title: "Guide coach",
          kicker: progressSignal(profile),
          body: "Build a few clean attempts and watch the graph for a steadier line.",
          action: "Aim for accurate first answers before chasing speed."

      function coachAdviceForResult(session) {
        if (!state.student || !session) return null;
        var followUp = diagnosticFollowUp(session);
        var mistakes = session.mistakes || [];
        var accuracy = Number(session.accuracy) || 0;
        var attempted = Number(session.attempted) || 0;
        if (mistakes.length) {

      function practiceGuideForLevel(level) {
        var generic = {
          meaning: "This skill helps you answer " + operationLabel(level.operation).toLowerCase() + " facts more automatically.",

        if (level.id === "M7" || level.id === "D6") {
          var settings = currentMultiplicationOptions();
          var tables = normalizeTables(settings.tables);
          var first = tables[0];
          var second = tables.length > 1 ? tables[1] : (first === 12 ? 11 : first + 1);
          if (settings.practiceMode === "division") {

              strategy: "Turn each division question into a multiplication fact: ask which number times the divisor makes the total.",
              examples: [

              ],
              guided: [

              ? [
                  first + " x 7 = " + (first * 7),
                  "8 x " + second + " = " + (8 * second),
                  (first * 6) + " / " + first + " = 6"
                ]
              : [
                  first + " x 7 = " + (first * 7),
                  "8 x " + second + " = " + (8 * second),
                  first + " x 10 = " + (first * 10)
                ],
            guided: [
              "Say the table you are practising before you answer.",
              "For a tough fact, move from a nearby known fact.",
              settings.includeReverseDivision ? "For division, ask which factor makes the total." : "Check by swapping the factors around."
            ],
            independent: "Start practice when you can explain how you got two of the examples without counting one by one."
          };
        }

        if (level.operation === "measurement") {
          return {
            meaning: "Metric conversion means renaming the same amount using a different unit, such as metres, centimetres, millimetres, litres, millilitres, grams, or kilograms.",
            strategy: "Use place value. Moving to a smaller unit makes the number larger; moving to a larger unit makes the number smaller.",
            examples: [
              "1 m = 100 cm",
              "1000 mL = 1 L",
              "2.5 kg = 2500 g"
            ],
            guided: [

              "Ask whether the new unit is smaller or larger.",

          };
        }

        var friendGuideTarget = friendTargetFromTags(level.tags);
        if (friendGuideTarget && level.tags.indexOf("bridge") < 0 && level.operation === "addition") {
          var addVisible = friendGuideTarget === 10 ? 4 : (friendGuideTarget === 150 ? 85 : (friendGuideTarget === 1500 ? 900 : friendGuideTarget / 4));
          var addPartner = friendGuideTarget - addVisible;
          return {
            meaning: "Friends of " + friendGuideTarget + " are number pairs that make " + friendGuideTarget + ".",
            strategy: "Look at the number you can see, then name the partner that finishes the target number.",
            examples: [
              addVisible + " + ? = " + friendGuideTarget + ", so ? = " + addPartner,
              "? + " + addPartner + " = " + friendGuideTarget + ", so ? = " + addVisible,
              addVisible + " + " + addPartner + " = " + friendGuideTarget
            ],
            guided: [
              "Hold " + friendGuideTarget + " in your head.",
              "Say the number you can see.",
              "Use place value to find the gap, then try to remember the pair."
            ],
            independent: "When the pairs feel familiar, practise answering the missing number quickly."

        }

        if (friendGuideTarget && level.tags.indexOf("bridge") < 0 && level.operation === "subtraction") {
          var subKnown = friendGuideTarget === 10 ? 4 : (friendGuideTarget === 150 ? 65 : (friendGuideTarget === 1500 ? 600 : friendGuideTarget / 4));
          var subLeft = friendGuideTarget - subKnown;
          return {
            meaning: "These facts use " + friendGuideTarget + " as the whole and ask which part is left or missing.",
            strategy: "Think part-part-whole: if " + friendGuideTarget + " is the whole, the two parts must fit together to make " + friendGuideTarget + ".",
            examples: [

            ],

        if (level.tags.indexOf("bridge") >= 0 && level.operation === "addition") {

            guided: [

        if (level.tags.indexOf("bridge") >= 0 && level.operation === "subtraction") {

            strategy: "Subtract enough to reach 10, then subtract the rest.",
            examples: ["14 - 6 = 14 - 4 - 2", "12 - 5 = 12 - 2 - 3", "17 - 9 = 17 - 7 - 2"],

              "Split the amount you are subtracting.",
              "Land on 10, then finish the subtraction."

            independent: "Start practice when the split feels natural."
          };

        if (level.operation === "multiplication") {
          return {
            meaning: "Multiplication facts describe equal groups.",
            strategy: "Use a known table fact, a double, or a 10-times fact to help with nearby facts.",
            examples: ["6 x 5 = 30", "6 x 6 = 36", "6 x 7 = 36 + 6"],
            guided: [
              "Identify the table or factor.",
              "Use a nearby fact you know instantly.",

            independent: "Begin fluency practice when you can explain the pattern behind the fact."

        if (level.operation === "division") {

              "Ask what times the divisor makes the total.",
              "Check by multiplying your answer back."

            independent: "Start practice when you can turn each division fact into a multiplication fact."
          };
        }

        if (level.operation === "subtraction") {
          return {
            meaning: "Subtraction asks what is left or how far apart two numbers are.",
            strategy: "Use counting back for small amounts and known addition facts for missing parts.",
            examples: ["9 - 4 = 5", "15 - 7 = 8", "20 - 6 = 14"],
            guided: [
              "Read the starting number.",
              "Decide whether to count back or use a known fact.",
              "Check that the answer is smaller than the starting number."
            ],
            independent: "Practise when you can choose a strategy before answering."
          };
        }

        if (level.operation === "mixed") {

            meaning: "Mixed practice asks you to switch between operations.",
            strategy: "Look at the operation sign first, then choose the matching strategy.",
            examples: ["8 + 2 = 10", "10 - 3 = 7", "5 x 6 = 30"],
            guided: [
              "Name the operation.",
              "Pick the matching fact family or strategy.",
              "Check whether the answer should be larger or smaller."

            independent: "Start practice when you can slow down enough to notice the operation sign every time."
          };
        }

        if (level.operation === "addition") {
          return {
            meaning: "Addition combines parts to make a total.",
            strategy: "Look for pairs that make 10, doubles, or near doubles.",
            examples: ["6 + 4 = 10", "7 + 7 = 14", "8 + 9 = 17"],
            guided: [
              "Find the friend of 10 or double if there is one.",
              "Use the known fact first.",
              "Add any leftover amount."
            ],
            independent: "Practise when you can spot the helpful pattern before calculating."
          };
        }

        return generic;
      }

      async function hashText(text) {
        if (window.crypto && window.crypto.subtle && window.TextEncoder) {
          var bytes = new TextEncoder().encode(text);
          var digest = await window.crypto.subtle.digest("SHA-256", bytes);
          return Array.from(new Uint8Array(digest)).map(function (b) {
            return b.toString(16).padStart(2, "0");
          }).join("");
        }
        try {
          return "demo-" + btoa(unescape(encodeURIComponent(text)));
        } catch (error) {
          return "demo-" + String(text).split("").reverse().join("");
        }
      }

      function randomClassCode() {
        var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        var out = [];
        for (var group = 0; group < 3; group += 1) {
          var chunk = "";
          for (var i = 0; i < 3; i += 1) {
            chunk += chars[rand(0, chars.length - 1)];
          }
          out.push(chunk);
        }
        return out.join("-");
      }

      function uniqueClassCode() {
        var code = randomClassCode();
        while (store.classes.some(function (item) { return item.code === code && !item.deletedAt; })) {
          code = randomClassCode();
        }
        return code;
      }

      function question(text, answer, operation, tags) {
        return {
          text: text,
          answer: answer,
          operation: operation,
          tags: tags || []
        };
      }

      function friendTargetFromTags(tags) {
        var found = (tags || []).find(function (tag) {
          return /^friends\d+$/.test(tag);
        });
        return found ? Number(found.replace("friends", "")) : null;
      }

      function friendStepForTarget(target) {
        if (target === 10) return 1;
        if (target === 100) return 10;
        if (target === 150) return 5;
        if (target === 1000) return 50;
        if (target === 1500) return 100;
        return 10;
      }

      function randomFriendPart(target, step) {
        var max = Math.max(1, Math.floor((target - step) / step));
        return rand(1, max) * step;
      }

      function generateFriendAdditionQuestion(level, target) {
        var step = friendStepForTarget(target);
        var known = randomFriendPart(target, step);
        var missing = target - known;
        if (Math.random() > 0.5) return question(known + " + ? = " + target, missing, "addition", level.tags);
        return question("? + " + known + " = " + target, missing, "addition", level.tags);
      }

      function generateFriendSubtractionQuestion(level, target) {
        var step = friendStepForTarget(target);
        var known = randomFriendPart(target, step);
        var missing = target - known;
        if (Math.random() > 0.5) return question(target + " - ? = " + missing, known, "subtraction", level.tags);
        return question(target + " - " + known, missing, "subtraction", level.tags);
      }

      function roundedMetricAnswer(value) {
        return Math.round(value * 1000) / 1000;
      }

      function formatMetricNumber(value) {
        var rounded = roundedMetricAnswer(value);
        return String(rounded).replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
      }

      function metricQuestionFromPair(level, pair) {
        var value = choice(pair.values);
        var answer = roundedMetricAnswer((value * pair.fromFactor) / pair.toFactor);
        var tags = level.tags.concat(pair.tags || []);
        return question(formatMetricNumber(value) + " " + pair.from + " = ? " + pair.to, answer, "measurement", tags);
      }

      function generateMetricQuestion(level) {
        var lengthSmall = [
          { from: "m", fromFactor: 1, to: "cm", toFactor: 0.01, values: [1, 2, 3, 4, 5, 10], tags: ["length", "centi"] },
          { from: "cm", fromFactor: 0.01, to: "m", toFactor: 1, values: [100, 150, 200, 250, 300, 500], tags: ["length", "centi"] },
          { from: "m", fromFactor: 1, to: "mm", toFactor: 0.001, values: [1, 2, 3, 4, 5], tags: ["length", "milli"] },
          { from: "mm", fromFactor: 0.001, to: "m", toFactor: 1, values: [1000, 1500, 2000, 2500, 5000], tags: ["length", "milli"] },
          { from: "cm", fromFactor: 0.01, to: "mm", toFactor: 0.001, values: [1, 5, 10, 25, 50, 100], tags: ["length", "milli", "centi"] },
          { from: "mm", fromFactor: 0.001, to: "cm", toFactor: 0.01, values: [10, 50, 100, 250, 500], tags: ["length", "milli", "centi"] }
        ];
        var kilometres = [
          { from: "km", fromFactor: 1000, to: "m", toFactor: 1, values: [1, 2, 3, 4, 5, 10], tags: ["length", "kilo"] },
          { from: "m", fromFactor: 1, to: "km", toFactor: 1000, values: [1000, 1500, 2000, 2500, 5000, 10000], tags: ["length", "kilo"] }
        ];
        var capacity = [
          { from: "L", fromFactor: 1, to: "mL", toFactor: 0.001, values: [1, 2, 3, 4, 5, 1.5, 2.5], tags: ["capacity", "milli"] },
          { from: "mL", fromFactor: 0.001, to: "L", toFactor: 1, values: [500, 1000, 1500, 2000, 2500, 5000], tags: ["capacity", "milli"] }
        ];
        var mass = [
          { from: "kg", fromFactor: 1, to: "g", toFactor: 0.001, values: [1, 2, 3, 4, 5, 1.5, 2.5], tags: ["mass", "kilo"] },
          { from: "g", fromFactor: 0.001, to: "kg", toFactor: 1, values: [500, 1000, 1500, 2000, 2500, 5000], tags: ["mass", "kilo"] }
        ];
        var pools = {
          U1: lengthSmall,
          U2: kilometres,
          U3: capacity,
          U4: mass,
          U5: lengthSmall.concat(kilometres, capacity, mass)
        };
        return metricQuestionFromPair(level, choice(pools[level.id] || pools.U5));
      }

      function generateCustomMultiplicationQuestion(options) {
        var settings = options || currentMultiplicationOptions();
        var tables = normalizeTables(settings.tables);
        var practiceMode = settings.practiceMode === "division" ? "division" : "multiplication";
        var factor = choice(tables);
        var allMultiplicationFacts = isAllMultiplicationFacts(settings);
        var other = allMultiplicationFacts ? rand(0, 12) : rand(1, 12);
        var tags = customMultiplicationTags(settings);
        if (practiceMode === "division" || (settings.includeReverseDivision && Math.random() > 0.5)) {
          return question((factor * other) + " / " + factor, other, "division", tags);
        }
        if (allMultiplicationFacts) {
          var allA = rand(0, 12);
          var allB = rand(0, 12);
          return question(allA + " x " + allB, allA * allB, "multiplication", tags);
        }
        var ordered = shufflePair(factor, other);
        return question(ordered[0] + " x " + ordered[1], factor * other, "multiplication", tags);
      }

      function generateQuestion(levelId, options) {
        var level = levelById(levelId);
        var id = level.id;
        var friendTarget = friendTargetFromTags(level.tags);

        if (friendTarget && level.tags.indexOf("bridge") < 0 && level.operation === "addition") {
          return generateFriendAdditionQuestion(level, friendTarget);
        }

        if (friendTarget && level.tags.indexOf("bridge") < 0 && level.operation === "subtraction") {
          return generateFriendSubtractionQuestion(level, friendTarget);
        }

        if (id === "A1") {
          var sumA1 = rand(2, 10);
          var aA1 = rand(0, sumA1);
          return question(aA1 + " + " + (sumA1 - aA1), sumA1, "addition", level.tags);
        }

        if (id === "A2") {
          var pairA2 = choice([[1, 9], [2, 8], [3, 7], [4, 6], [5, 5]]);
          var orderedA2 = shufflePair(pairA2[0], pairA2[1]);
          if (Math.random() > 0.5) return question(orderedA2[0] + " + ? = 10", orderedA2[1], "addition", level.tags);
          return question("? + " + orderedA2[0] + " = 10", orderedA2[1], "addition", level.tags);
        }

        if (id === "A3") {
          var knownA3 = rand(1, 9);
          var missingA3 = 10 - knownA3;
          if (Math.random() > 0.5) return question(knownA3 + " + ? = 10", missingA3, "addition", level.tags);
          return question("? + " + knownA3 + " = 10", missingA3, "addition", level.tags);
        }

        if (id === "A4") {
          var sumA4 = rand(6, 20);
          var aA4 = rand(0, sumA4);
          return question(aA4 + " + " + (sumA4 - aA4), sumA4, "addition", level.tags);
        }

        if (id === "A5") {
          var targetA5 = choice([5, 15, 25, 35]);
          var aA5 = rand(Math.max(0, targetA5 - 20), targetA5);
          return question(aA5 + " + " + (targetA5 - aA5), targetA5, "addition", level.tags);
        }

        if (id === "A6") {
          var aA6 = rand(6, 9);
          var bA6 = rand(10 - aA6 + 1, 9);
          return question(aA6 + " + " + bA6, aA6 + bA6, "addition", level.tags);
        }

        if (id === "A7") return generateQuestion(choice(["A1", "A2", "A4", "A5", "A6", "A8", "A9", "A10", "A11"]));

        if (id === "S1") {
          var topS1 = rand(1, 10);
          var subS1 = rand(0, topS1);
          return question(topS1 + " - " + subS1, topS1 - subS1, "subtraction", level.tags);
        }

        if (id === "S2") {
          var subS2 = rand(1, 9);
          return question("10 - " + subS2, 10 - subS2, "subtraction", level.tags);
        }

        if (id === "S3") {
          var resultS3 = rand(1, 9);
          if (Math.random() > 0.5) return question("10 - ? = " + resultS3, 10 - resultS3, "subtraction", level.tags);
          return question("? - " + (10 - resultS3) + " = " + resultS3, 10, "subtraction", level.tags);
        }

        if (id === "S4") {
          var topS4 = rand(5, 20);
          var subS4 = rand(0, topS4);
          return question(topS4 + " - " + subS4, topS4 - subS4, "subtraction", level.tags);
        }

        if (id === "S5") {
          var targetS5 = choice([5, 15, 25]);
          var subS5 = rand(1, 20);
          return question((targetS5 + subS5) + " - " + subS5, targetS5, "subtraction", level.tags);
        }

        if (id === "S6") {
          var topS6 = rand(11, 20);
          var answerS6 = rand(1, 9);
          var subThroughTen = topS6 - answerS6;
          return question(topS6 + " - " + subThroughTen, answerS6, "subtraction", level.tags);
        }

        if (id === "S7") return generateQuestion(choice(["S1", "S2", "S4", "S5", "S6", "S8", "S9", "S10", "S11"]));

        if (id === "M1") {
          var factorM1 = choice([2, 5, 10]);
          var otherM1 = rand(0, 12);
          var orderedM1 = shufflePair(factorM1, otherM1);
          return question(orderedM1[0] + " x " + orderedM1[1], factorM1 * otherM1, "multiplication", level.tags);
        }

        if (id === "M2") {
          var otherM2 = rand(0, 12);
          var orderedM2 = shufflePair(5, otherM2);
          return question(orderedM2[0] + " x " + orderedM2[1], 5 * otherM2, "multiplication", level.tags);
        }

        if (id === "M3") {
          var factorM3 = 5;
          var otherM3 = rand(1, 12);
          var orderedM3 = shufflePair(factorM3, otherM3);
          return question(orderedM3[0] + " x " + orderedM3[1], factorM3 * otherM3, "multiplication", level.tags);
        }

        if (id === "M4") {
          var factorM4 = choice([3, 4]);
          var otherM4 = rand(0, 12);
          var orderedM4 = shufflePair(factorM4, otherM4);
          return question(orderedM4[0] + " x " + orderedM4[1], factorM4 * otherM4, "multiplication", level.tags);
        }

        if (id === "M5") {
          var factorM5 = choice([6, 7, 8, 9]);
          var otherM5 = rand(0, 12);
          var orderedM5 = shufflePair(factorM5, otherM5);
          return question(orderedM5[0] + " x " + orderedM5[1], factorM5 * otherM5, "multiplication", level.tags);
        }

        if (id === "M6") {
          var aM6 = rand(0, 12);
          var bM6 = rand(0, 12);
          return question(aM6 + " x " + bM6, aM6 * bM6, "multiplication", level.tags);
        }

        if (id === "M7" || id === "D6") return generateCustomMultiplicationQuestion(options);

        if (id === "D1") {
          var divisorD1 = choice([2, 5, 10]);
          var quotientD1 = rand(0, 12);
          return question((divisorD1 * quotientD1) + " / " + divisorD1, quotientD1, "division", level.tags);
        }

        if (id === "D2") {
          var quotientD2 = rand(0, 12);
          return question((5 * quotientD2) + " / 5", quotientD2, "division", level.tags);
        }

        if (id === "D3") {
          var divisorD3 = choice([5, 10]);
          var quotientD3 = rand(0, 12);
          return question((divisorD3 * quotientD3) + " / " + divisorD3, quotientD3, "division", level.tags);
        }

        if (id === "D4") {
          var divisorD4 = rand(2, 12);
          var quotientD4 = rand(1, 12);
          return question((divisorD4 * quotientD4) + " / " + divisorD4, quotientD4, "division", level.tags);
        }

        if (id === "D5") return generateQuestion(choice(["D1", "D2", "D3", "D4"]));

        if (id === "U1" || id === "U2" || id === "U3" || id === "U4" || id === "U5") return generateMetricQuestion(level);

        if (id === "X1") return generateQuestion(choice(["A1", "S1"]));
        if (id === "X2") return generateQuestion(choice(["A2", "A3", "S2", "S3"]));
        if (id === "X3") return generateQuestion(choice(["A5", "S5", "M2", "M3", "D2"]));
        if (id === "X4") return generateQuestion(choice(["M1", "D1", "D3"]));
        if (id === "X5") return generateQuestion(choice(["A1", "A2", "S1", "S2", "M1", "D1"]));
        if (id === "X6") return generateQuestion(choice(["A4", "A6", "S4", "S6", "M4", "M5", "D4"]));
        if (id === "X7") return generateQuestion(choice(["A8", "A9", "A10", "A11", "S8", "S9", "S10", "S11"]));

        return generateQuestion("A1");
      }

        stopTimer();

      function stopTimer() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      function startTimer() {
        stopTimer();
        timerId = setInterval(function () {
          if (!state.active || state.active.mode !== "sprint") {
            stopTimer();
            return;
          }
          state.active.timeLeft -= 1;
          if (state.active.timeLeft <= 0) {
            finishSession();
          } else {
            render();
          }
        }, 1000);
      }

      function makeStudentAlias(firstName, lastName) {
        var first = String(firstName || "").trim();
        var last = String(lastName || "").trim();
        var initial = first ? first.charAt(0).toUpperCase() : "";
        return (initial + " " + last).trim() || "Student";
      }

      function cleanStudentAlias(value) {
        return String(value || "").trim().replace(/\s+/g, " ");
      }

      function splitImportLine(line) {
        if (line.indexOf("\t") >= 0) return line.split("\t");
        var cells = [];
        var current = "";
        var quoted = false;
        for (var i = 0; i < line.length; i += 1) {
          var char = line.charAt(i);
          var next = line.charAt(i + 1);
          if (char === '"' && quoted && next === '"') {
            current += '"';
            i += 1;
          } else if (char === '"') {
            quoted = !quoted;
          } else if (char === "," && !quoted) {
            cells.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        cells.push(current);
        return cells;
      }

      function normalizeImportCell(value) {
        return String(value || "").replace(/\uFEFF/g, "").trim();
      }

      function importHeaderMap(cells) {
        var lowered = cells.map(function (cell) {
          return normalizeImportCell(cell).toLowerCase();
        });
        var firstIndex = lowered.findIndex(function (cell) {
          return /(^|\s)(first|given|preferred)(\s|_|-|$)/.test(cell);
        });
        var lastIndex = lowered.findIndex(function (cell) {
          return /(^|\s)(last|surname|family)(\s|_|-|$)/.test(cell);
        });
        var nameIndex = lowered.findIndex(function (cell) {
          return firstIndex < 0 && lastIndex < 0 && /(^|\s)(student|name|full name)(\s|_|-|$)/.test(cell);
        });
        if (firstIndex < 0 && lastIndex < 0 && nameIndex < 0) return null;
        return {
          firstIndex: firstIndex,
          lastIndex: lastIndex,
          nameIndex: nameIndex
        };
      }

      function firstInitial(value) {
        var match = String(value || "").trim().match(/[A-Za-z0-9]/);
        return match ? match[0].toUpperCase() : "";
      }

      function aliasFromNameParts(firstName, lastName, fullName) {
        var first = normalizeImportCell(firstName);
        var last = normalizeImportCell(lastName);
        if (first || last) return (firstInitial(first) + firstInitial(last)).trim();
        var words = normalizeImportCell(fullName).split(/[\s,]+/).filter(Boolean);
        if (!words.length) return "";
        if (words.length === 1) return firstInitial(words[0]);
        return firstInitial(words[0]) + firstInitial(words[words.length - 1]);
      }

      function aliasFromImportCells(cells, header) {
        var values = cells.map(normalizeImportCell);
        if (header) {
          return aliasFromNameParts(
            header.firstIndex >= 0 ? values[header.firstIndex] : "",
            header.lastIndex >= 0 ? values[header.lastIndex] : "",
            header.nameIndex >= 0 ? values[header.nameIndex] : ""
          );
        }
        var nonEmpty = values.filter(Boolean);
        if (!nonEmpty.length) return "";
        if (nonEmpty.length === 1) return aliasFromNameParts("", "", nonEmpty[0]);
        return aliasFromNameParts(nonEmpty[0], nonEmpty[1], "");
      }

      function uniqueAliasForImport(classId, baseAlias, reserved) {
        var base = cleanStudentAlias(baseAlias).toUpperCase().slice(0, 36) || "S";
        var used = reserved || {};
        var existing = {};
        studentsForClass(classId).forEach(function (student) {
          existing[String(student.alias || "").toLowerCase()] = true;
        });
        var alias = base;
        var count = 2;
        while (existing[alias.toLowerCase()] || used[alias.toLowerCase()]) {
          alias = base + count;
          count += 1;
        }
        used[alias.toLowerCase()] = true;
        return alias;
      }

      function parseStudentImportText(text, classId) {
        var lines = String(text || "").split(/\r?\n/);
        var parsedRows = lines.map(function (line, index) {
          return {
            rowNumber: index + 1,
            cells: splitImportLine(line).map(normalizeImportCell)
          };
        }).filter(function (row) {
          return row.cells.some(Boolean);
        });
        if (!parsedRows.length) return [];
        var header = importHeaderMap(parsedRows[0].cells);
        var dataRows = header ? parsedRows.slice(1) : parsedRows;
        var reserved = {};
        return dataRows.map(function (row) {
          var baseAlias = aliasFromImportCells(row.cells, header);
          if (!baseAlias) {
            return {
              rowNumber: row.rowNumber,
              alias: "",
              status: "Skipped",
              error: "No initials found"
            };
          }
          return {
            rowNumber: row.rowNumber,
            alias: uniqueAliasForImport(classId, baseAlias, reserved),
            status: "Ready",
            error: ""
          };
        });
      }

      function uniqueLocalAlias(classId, firstName, lastName) {
        var base = makeStudentAlias(firstName, lastName);
        var alias = base;
        var count = 2;
        while (studentsForClass(classId).some(function (student) {
          return String(student.alias || "").toLowerCase() === alias.toLowerCase();
        })) {
          alias = base + " " + count;
          count += 1;
        }
        return alias;
      }

      function focusAnswer(position) {
        var input = document.getElementById("answerInput");
        if (input) {
          input.focus();
          if (position != null && input.setSelectionRange) {
            var safePosition = Math.max(0, Math.min(position, input.value.length));
            input.setSelectionRange(safePosition, safePosition);
          }
        }
      }

      function sanitizeAnswerValue(value) {
        var raw = String(value || "").replace(/[^\d.-]/g, "");
        var negative = raw.charAt(0) === "-";
        raw = raw.replace(/-/g, "");
        var parts = raw.split(".");
        var whole = parts.shift() || "";
        var decimal = parts.length ? "." + parts.join("").slice(0, 3) : "";
        return ((negative ? "-" : "") + whole + decimal).slice(0, 8);
      }

      function updateInputFromDom() {
        var input = document.getElementById("answerInput");
        if (input && state.active) state.active.input = sanitizeAnswerValue(input.value);
      }

      function answerEditState() {
        var input = document.getElementById("answerInput");
        if (!input) return null;
        var value = sanitizeAnswerValue(input.value);
        var start = input.selectionStart == null ? value.length : input.selectionStart;
        var end = input.selectionEnd == null ? value.length : input.selectionEnd;
        return {
          value: value,
          start: Math.max(0, Math.min(start, value.length)),
          end: Math.max(0, Math.min(end, value.length))
        };
      }

      function setAnswerInput(value, caretPosition) {
        if (!state.active) return;
        var cleaned = sanitizeAnswerValue(value);
        state.active.input = cleaned;
        var input = document.getElementById("answerInput");
        if (input) {
          input.value = cleaned;
          return;
        }
        render();
      }

      function isAnswerControlAction(action) {
        return action === "keypad" || action === "backspace" || action === "clear-answer" || action === "submit-answer";
      }

      function handlePhysicalAnswerKey(event) {
        if (!state.active) return false;
        var target = event.target;
        var inAnswer = target && target.id === "answerInput";
        var typingElsewhere = target && /^(INPUT|TEXTAREA|SELECT)$/.test(target.tagName || "") && !inAnswer;
        if (typingElsewhere) return false;

        if (/^\d$/.test(event.key)) {
          event.preventDefault();
          setAnswerInput(String(state.active.input || "") + event.key);
          return true;
        }

        if (event.key === "-" && !String(state.active.input || "").includes("-")) {
          event.preventDefault();
          setAnswerInput("-" + String(state.active.input || ""));
          return true;
        }

        if (event.key === "." && !String(state.active.input || "").includes(".")) {
          event.preventDefault();
          setAnswerInput(String(state.active.input || "") + ".");
          return true;
        }

        if (event.key === "Backspace" || event.key === "Delete") {
          event.preventDefault();
          setAnswerInput(String(state.active.input || "").slice(0, -1));
          return true;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          submitAnswer();
          return true;
        }

        if (event.key === "Escape") {
          event.preventDefault();
          setAnswerInput("", 0);
          return true;
        }

        return false;
      }

      function submitAnswer() {
        if (!state.active) return;
        updateInputFromDom();
        var active = state.active;
        var raw = active.input.trim();
        if (!raw) {
          active.feedback = "Type an answer first.";
          render();
          return;
        }
        var submitted = Number(raw);
        var q = active.question;
        if (Math.abs(submitted - Number(q.answer)) < 0.0001) {
          var correctedAfterRetry = active.pendingWrong != null;
          active.correct += 1;
          active.attempted += 1;
          active.streak += 1;
          active.bestStreak = Math.max(active.bestStreak, active.streak);
          if (correctedAfterRetry) {
            active.mistakes.push({
              question: q.text,
              studentAnswer: active.pendingWrong,
              correctAnswer: q.answer,
              operation: q.operation,
              levelId: active.levelId,
              recovered: true,
              tags: q.tags
            });
            active.pendingWrong = null;
          }
          active.input = "";
          nextQuestion();
          return;
        }
        if (active.tries === 0) {
          active.attempted += 1;
          active.streak = 0;
          active.tries = 1;
          active.pendingWrong = raw;
          active.feedback = "Try once more.";
          active.input = "";
          render();
          return;
        }
        active.attempted += 1;
        active.streak = 0;
        active.mistakes.push({
          question: q.text,
          studentAnswer: active.pendingWrong ? active.pendingWrong + ", then " + raw : raw,
          correctAnswer: q.answer,
          operation: q.operation,
          levelId: active.levelId,
          recovered: false,
          tags: q.tags
        });
        active.pendingWrong = null;
        active.feedback = "Answer: " + q.answer;
        active.input = "";
        render();
        setTimeout(nextQuestion, 800);
      }

      function nextQuestion() {
        if (!state.active) return;
        state.active.question = generateQuestion(state.active.levelId, state.active.practiceOptions);
        state.active.tries = 0;
        state.active.pendingWrong = null;
        state.active.feedback = "";
        state.active.input = "";
        render();
      }

      async function finishSession() {
        if (!state.active) return;
        stopTimer();
        var active = state.active;
        var level = levelById(active.levelId);
        if (active.pendingWrong != null) {
          active.mistakes.push({
            question: active.question.text,
            studentAnswer: active.pendingWrong,
            correctAnswer: active.question.answer,
            operation: active.question.operation,
            levelId: active.levelId,
            recovered: false,
            tags: active.question.tags
          });
          active.pendingWrong = null;
        }
        var timeSpent = active.mode === "sprint" ? 100 - Math.max(active.timeLeft || 0, 0) : Math.round((Date.now() - active.startedAt) / 1000);
        var accuracy = active.attempted ? Math.round((active.correct / active.attempted) * 100) : 0;
        var session = {
          id: uid("session"),
          studentId: state.student ? state.student.id : null,
          studentAlias: state.student ? state.student.alias : "Guest",
          classId: state.student ? state.student.classId : null,
          teacherId: state.student ? state.student.teacherId : null,
          createdAt: new Date().toISOString(),
          mode: active.mode,
          operation: level.operation,
          levelId: active.levelId,
          levelName: active.levelName,
          tags: active.sessionTags || level.tags,
          practiceOptions: active.practiceOptions,
          attempted: active.attempted,
          correct: active.correct,
          accuracy: accuracy,
          bestStreak: active.bestStreak,
          timeSpent: timeSpent,
          score: active.correct,
          mistakes: active.mistakes
        };
        if (backendActive() && state.student && state.student.accessToken) {
          var result = await supabaseClient.rpc("submit_student_session", {
            p_student_id: state.student.id,
            p_access_token: state.student.accessToken,
            p_mode: session.mode,
            p_operation: session.operation,
            p_level_id: session.levelId,
            p_level_name: session.levelName,
            p_tags: session.tags,
            p_attempted: session.attempted,
            p_correct: session.correct,
            p_accuracy: session.accuracy,
            p_best_streak: session.bestStreak,
            p_time_spent: session.timeSpent,
            p_score: session.score,
            p_mistakes: session.mistakes
          });
          if (result.error) {
            session.saveError = result.error.message;
          } else {
            session.synced = true;
            session.id = result.data || session.id;
            state.remoteSessions = state.remoteSessions.filter(function (item) {
              return item.id !== session.id;
            }).concat([session]);
          }
        } else if (state.student) {
          store.sessions.push(session);
          saveStore();
        }
        state.results = session;
        state.active = null;
        state.view = "results";
        render();
      }
