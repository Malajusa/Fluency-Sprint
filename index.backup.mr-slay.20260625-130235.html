          '      </select>',
          '      <select data-action="results-level" aria-label="Results challenge selector">' + levelOptions(levelId) + '</select>',
          '    </div>',
          '  </div>',
          studentResultsSummary(sessions),
          '</section>',
          studentYearPathwayPanel(student),
          studentObservationPanel(student),
          studentChallengeProgressPanel(student.id, levelId, "Selected challenge", true, false),
          timesTableStudentProfile(student),
          studentSessionsTable(student)
        ].join("");
      }

      function studentResultsSummary(sessions) {
        var stats = scoreStats(sessions);
        var avgAccuracy = sessions.length ? Math.round(avg(sessions.map(function (s) { return s.accuracy; }))) : 0;
        return [
          '  <div class="stats">',
          statHTML("Sessions", sessions.length),
          statHTML("Average accuracy", avgAccuracy + "%"),
          statHTML("High score", formatScore(stats.high)),
          statHTML("Median score", formatScore(stats.median)),
          '  </div>'
        ].join("");
      }

      function studentYearPathwayPanel(student) {
        var readiness = readinessForStudent(student);
        var focusIds = focusLevelIdsForYear(student.yearLevel);
        return [
          '<section class="panel section stack">',
          '  <div><h3>Year-level pathway</h3><p class="muted">' + escapeHTML(readiness.guideText) + '</p></div>',
          '  <div class="stats">',
          statHTML("Readiness", readiness.label),
          statHTML("Secure skills", readiness.secure + "/" + readiness.expected),
          statHTML("Nearly secure", readiness.nearly),
          statHTML("Not started", readiness.notStarted),
          '  </div>',
          focusIds.length ? [
            '  <table><thead><tr><th>Focus skill</th><th>Status</th><th>Evidence</th><th>Progress</th></tr></thead><tbody>',
            focusIds.map(function (levelId) {
              var profile = proficiencyForStudentLevel(student.id, levelId);
              return [
                '<tr>',
                '<td><strong>' + escapeHTML(levelLabel(levelId)) + '</strong></td>',
                '<td>' + proficiencyPill(profile) + '</td>',
                '<td>' + profile.sessions + ' sessions<div class="tiny muted">' + profile.attempts + ' attempts, recent ' + (profile.recentAccuracy == null ? '--' : profile.recentAccuracy + '%') + '</div></td>',
                '<td>' + escapeHTML(progressSignal(profile)) + '<div class="tiny muted">' + escapeHTML(proficiencyEvidenceText(profile)) + '</div></td>',
                '</tr>'
              ].join("");
            }).join(""),
            '  </tbody></table>'
          ].join("") : '<div class="empty">No pathway focus has been set for this year level yet.</div>',
          '</section>'
        ].join("");
      }

      function studentSessionsTable(student) {
        var sessions = sessionsForStudent(student.id).slice().sort(function (a, b) {
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        }).slice(0, 12);
        if (!sessions.length) return '<div class="empty">Saved sessions will appear here.</div>';
        return [
          '<section class="panel section stack">',
          '  <h3>Recent student sessions</h3>',
          '  <table><thead><tr><th>When</th><th>Challenge</th><th>Mode</th><th>Score</th><th>Accuracy</th><th>Mistakes</th></tr></thead><tbody>',
          sessions.map(function (session) {
            return '<tr><td>' + formatDateTime(session.createdAt) + '</td><td>' + escapeHTML(session.levelId) + '<div class="tiny muted">' + escapeHTML(session.levelName) + '</div></td><td>' + escapeHTML(session.mode) + '</td><td>' + session.score + '</td><td>' + session.accuracy + '%</td><td>' + (session.mistakes || []).length + '</td></tr>';
          }).join(""),
          '  </tbody></table>',
          '</section>'
        ].join("");
      }

      function sessionsForClassChallenge(classId, levelId) {
        return sessionsForClass(classId).filter(function (session) {
          return session.levelId === levelId;
        }).sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
      }

      function sessionHasTag(session, tag) {
        if ((session.tags || []).indexOf(tag) >= 0) return true;
        return (session.mistakes || []).some(function (mistake) {
          return (mistake.tags || []).indexOf(tag) >= 0;
        });
      }

      function sessionsWithTag(sessions, tag) {
        return sessions.filter(function (session) {
          return sessionHasTag(session, tag);
        });
      }

      function sessionMatchesTable(session, table) {
        return sessionHasTag(session, "times" + table) || sessionHasTag(session, "divide" + table);
      }

      function sessionsForStudentTable(studentId, table, operation) {
        return sessionsForStudent(studentId).filter(function (session) {
          return sessionMatchesOperation(session, operation) && sessionMatchesTable(session, table);
        });
      }

      function proficiencyForSessions(sessions) {
        var ordered = sessions.slice().sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
        if (!ordered.length) {
          return {
            status: "notStarted",
            label: "No data",
            className: "none",
            sessions: 0,
            attempts: 0,
            accuracy: null,
            recentAccuracy: null,
            bestSprintAccuracy: null,
            improving: false,
            recentMistakes: 0
          };
        }
        var recent = ordered.slice(-3);
        var attempts = sum(ordered.map(function (session) { return Number(session.attempted) || 0; }));
        var accuracy = Math.round(avg(ordered.map(function (session) { return session.accuracy; })));
        var recentAccuracy = Math.round(avg(recent.map(function (session) { return session.accuracy; })));
        var sprintSessions = ordered.filter(function (session) {
          return session.mode === "sprint" || Number(session.timeSpent) > 0;
        });
        var bestSprintAccuracy = sprintSessions.length
          ? Math.max.apply(null, sprintSessions.map(function (session) { return Number(session.accuracy) || 0; }))
          : null;
        var firstWindow = ordered.slice(0, Math.min(2, ordered.length));
        var firstAccuracy = Math.round(avg(firstWindow.map(function (session) { return session.accuracy; })));
        var improving = ordered.length >= 2 && recentAccuracy >= firstAccuracy + 5;
        var recentMistakes = sum(recent.map(function (session) { return (session.mistakes || []).length; }));
        var profile = {
          status: "focus",
          label: "Focus",
          className: "focus",
          sessions: ordered.length,
          attempts: attempts,
          accuracy: accuracy,
          recentAccuracy: recentAccuracy,
          bestSprintAccuracy: bestSprintAccuracy,
          improving: improving,
          recentMistakes: recentMistakes
        };
        if (
          ordered.length >= 3 &&
          attempts >= 30 &&
          recentAccuracy >= 85 &&
          bestSprintAccuracy != null &&
          bestSprintAccuracy >= 80 &&
          recentMistakes <= 2
        ) {
          profile.status = "secure";
          profile.label = "Secure";
          profile.className = "secure";
        } else if (attempts >= 20 && recentAccuracy >= 75 && (improving || accuracy >= 75)) {
          profile.status = "nearlySecure";
          profile.label = "Nearly secure";
          profile.className = "nearly";
        } else if (attempts >= 10 || ordered.length >= 2) {
          profile.status = "building";
          profile.label = "Building";
          profile.className = "building";
        }
        return profile;
      }

      function proficiencyPill(profile) {
        return '<span class="proficiency ' + profile.className + '">' + escapeHTML(profile.label) + '</span>';
      }

      function proficiencyEvidenceText(profile) {
        if (!profile || profile.status === "notStarted") return "Needs a first session.";
        if (profile.status === "secure") return "Secure recent accuracy with timed evidence.";
        var notes = [];
        if (profile.attempts < 30) notes.push((30 - profile.attempts) + " more attempts");
        if (profile.recentAccuracy != null && profile.recentAccuracy < 85) notes.push("recent accuracy below 85%");
        if (profile.bestSprintAccuracy == null) notes.push("needs timed sprint evidence");
        if (profile.recentMistakes > 2) notes.push("review repeated recent mistakes");
        if (!notes.length && profile.status === "nearlySecure") return "Close to secure; repeat once more.";
        return notes.join(", ");
      }

      function progressSignal(profile) {
        if (!profile || profile.status === "notStarted") return "Ready to start";
        if (profile.status === "secure") return "Secure";
        if (profile.improving) return "Improving";
        if (profile.status === "nearlySecure") return "Nearly there";
        if (profile.status === "building") return "Keep building";
        return "Needs focus";
      }

      function tableProfileForStudent(studentId, table, operation) {
        return proficiencyForSessions(sessionsForStudentTable(studentId, table, operation));
      }

      function proficiencyForStudentLevel(studentId, levelId) {
        return proficiencyForSessions(sessionsForChallenge(studentId, levelId));
      }

      function readinessForStudent(student) {
        var focusIds = focusLevelIdsForYear(student.yearLevel);
        var availableIds = availableLevelIdsForYear(student.yearLevel);
        var expectedIds = unique(focusIds.concat(availableIds)).filter(function (levelId) {
          return LEVELS.some(function (level) { return level.id === levelId; });
        });
        var profiles = expectedIds.map(function (levelId) {
          return {
            levelId: levelId,
            profile: proficiencyForStudentLevel(student.id, levelId)
          };
        });
        var secure = profiles.filter(function (item) { return item.profile.status === "secure"; }).length;
        var nearly = profiles.filter(function (item) { return item.profile.status === "nearlySecure"; }).length;
        var notStarted = profiles.filter(function (item) { return item.profile.status === "notStarted"; }).length;
        var current = profiles.find(function (item) {
          return focusIds.indexOf(item.levelId) >= 0 && item.profile.status !== "secure";
        }) || profiles.find(function (item) {
          return item.profile.status !== "secure";
        }) || profiles[profiles.length - 1] || null;
        var status = "focus";
        var label = "Needs focus";
        var className = "focus";
        if (!sessionsForStudent(student.id).length) {
          status = "ready";
          label = "Ready to start";
          className = "none";
        } else if (profiles.length && secure === profiles.length) {
          status = "extensionReady";
          label = "Extension ready";
          className = "secure";
        } else if (current && current.profile.status === "nearlySecure") {
          status = "nearlySecure";
          label = "Nearly secure";
          className = "nearly";
        } else if (current && current.profile.status === "building") {
          status = "building";
          label = "Building";
          className = "building";
        }
        return {
          status: status,
          label: label,
          className: className,
          focusLevelId: current ? current.levelId : null,
          focusProfile: current ? current.profile : null,
          secure: secure,
          nearly: nearly,
          notStarted: notStarted,
          expected: profiles.length,
          guideText: curriculumGuideText(student.yearLevel)
        };
      }

      function readinessPill(readiness) {
        return '<span class="proficiency ' + readiness.className + '">' + escapeHTML(readiness.label) + '</span>';
      }

      function readinessFocusHTML(readiness) {
        if (!readiness.focusLevelId) return '<span class="muted">No focus needed</span>';
        return [
          '<strong>' + escapeHTML(levelLabel(readiness.focusLevelId)) + '</strong>',
          readiness.focusProfile ? '<div class="tiny muted">' + escapeHTML(proficiencyEvidenceText(readiness.focusProfile)) + '</div>' : ''
        ].join("");
      }

      function readinessCounts(students) {
        var profiles = students.map(readinessForStudent);
        return {
          ready: profiles.filter(function (item) { return item.status === "ready"; }).length,
          building: profiles.filter(function (item) { return item.status === "building"; }).length,
          nearly: profiles.filter(function (item) { return item.status === "nearlySecure"; }).length,
          secure: profiles.filter(function (item) { return item.status === "extensionReady"; }).length,
          focus: profiles.filter(function (item) { return item.status === "focus"; }).length
        };
      }

      function classObservationBank(students) {
        if (!students.length) return "";
        var rows = students.map(function (student) {
          return {
            student: student,
            observations: observationsForStudent(student)
          };
        }).filter(function (row) {
          return row.observations.length;
        }).sort(function (a, b) {
          return b.observations[0].priority - a.observations[0].priority;
        }).slice(0, 8);
        if (!rows.length) {
          return '<section class="panel section stack"><div><h3>Observation bank</h3><p class="muted">Teacher observations will appear after students complete more saved sessions.</p></div></section>';
        }
        return [
          '<section class="panel section stack">',
          '  <div><h3>Observation bank</h3><p class="muted">Pattern notes generated from saved fluency sessions. Use as prompts for teaching decisions, not fixed labels.</p></div>',
          '  <table><thead><tr><th>Student</th><th>Observation</th><th>Evidence</th><th>Suggested next move</th></tr></thead><tbody>',
          rows.map(function (row) {
            var primary = row.observations[0];
            return [
              '<tr>',
              '<td><strong>' + escapeHTML(studentFullName(row.student)) + '</strong><div class="tiny muted">' + escapeHTML(row.student.alias) + '</div></td>',
              '<td>' + escapeHTML(primary.text) + '</td>',
              '<td>' + escapeHTML(primary.evidence) + '</td>',
              '<td>' + escapeHTML(primary.action) + '</td>',
              '</tr>'
            ].join("");
          }).join(""),
          '  </tbody></table>',
          '</section>'
        ].join("");
      }

      function studentObservationPanel(student) {
        var observations = observationsForStudent(student);
        return [
          '<section class="panel section stack">',
          '  <div><h3>Observation bank</h3><p class="muted">Instructional notes generated from this student\'s saved practice and sprint evidence.</p></div>',
          observations.length ? [
            '  <table><thead><tr><th>Observation</th><th>Evidence</th><th>Suggested next move</th></tr></thead><tbody>',
            observations.map(function (item) {
              return [
                '<tr>',
                '<td>' + escapeHTML(item.text) + '</td>',
                '<td>' + escapeHTML(item.evidence) + '</td>',
                '<td>' + escapeHTML(item.action) + '</td>',
                '</tr>'
              ].join("");
            }).join(""),
            '  </tbody></table>'
          ].join("") : '<div class="empty">More saved sessions are needed before observations can be generated.</div>',
          '</section>'
        ].join("");
      }

      function observationsForStudent(student) {
        var sessions = sessionsForStudent(student.id).slice().sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
        if (!sessions.length) return [];
        var recent = sessions.slice(-5);
        var observations = [];
        var last = recent[recent.length - 1];
        if (last && daysAgo(last.createdAt) > 7) {
          observations.push({
            priority: 80,
            text: "Participation has dropped recently.",
            evidence: "Last saved session was " + formatDate(last.createdAt) + ".",
            action: "Use a short free-practice return task before the next sprint."
          });
        }
        var readiness = readinessForStudent(student);
        if (readiness.focusLevelId) {
          observations.push({
            priority: readiness.status === "focus" ? 70 : 45,
            text: "Current pathway focus is " + levelLabel(readiness.focusLevelId) + ".",
            evidence: readiness.focusProfile ? proficiencyEvidenceText(readiness.focusProfile) : "No secure evidence yet.",
            action: "Assign practice on this skill, then use the sprint climb to confirm."
          });
        }
        addOperationGapObservation(observations, recent);
        addMistakePatternObservation(observations, recent);
        addPracticeSprintTransferObservation(observations, recent);
        addPaceObservation(observations, recent);
        return observations.sort(function (a, b) {
          return b.priority - a.priority;
        }).slice(0, 4);
      }

      function addOperationGapObservation(observations, sessions) {
        var operations = ["addition", "subtraction", "multiplication", "division", "measurement"];
        var profiles = operations.map(function (operation) {
          var items = sessions.filter(function (session) {
            return sessionMatchesOperation(session, operation);
          });
          return {
            operation: operation,
            count: items.length,
            accuracy: items.length ? Math.round(avg(items.map(function (session) { return session.accuracy; }))) : null
          };
        }).filter(function (item) {
          return item.count >= 2 && item.accuracy != null;
        }).sort(function (a, b) {
          return a.accuracy - b.accuracy;
        });
        if (profiles.length && profiles[0].accuracy < 75) {
          observations.push({
            priority: 65,
            text: operationLabel(profiles[0].operation) + " is the most pressing recent operation gap.",
            evidence: profiles[0].count + " recent sessions averaged " + profiles[0].accuracy + "% accuracy.",
            action: "Use the lowest unlocked sprint or a focused practice guide for this operation."
          });
        }
      }

      function addMistakePatternObservation(observations, sessions) {
        var mistakes = [];
        sessions.forEach(function (session) {
          (session.mistakes || []).forEach(function (mistake) {
            mistakes.push(Object.assign({ sessionOperation: session.operation }, mistake));
          });
        });
        if (mistakes.length < 3) return;
        var tagCounts = {};
        mistakes.forEach(function (mistake) {
          (mistake.tags || []).forEach(function (tag) {
            tagCounts[tag] = (tagCounts[tag] || 0) + 1;
          });
        });
        var tag = Object.keys(tagCounts).sort(function (a, b) {
          return tagCounts[b] - tagCounts[a];
        })[0];
        if (tag && tagCounts[tag] >= 2) {
          observations.push({
            priority: 75,
            text: "Repeated mistakes are clustering around " + tagLabel(tag) + ".",
            evidence: tagCounts[tag] + " recent mistake records share this tag.",
            action: "Review missed examples, then retry that specific skill in practice."
          });
          return;
        }
        var operationCounts = {};
        mistakes.forEach(function (mistake) {
          var operation = mistake.operation || mistake.sessionOperation;
          operationCounts[operation] = (operationCounts[operation] || 0) + 1;
        });
        var operation = Object.keys(operationCounts).sort(function (a, b) {
          return operationCounts[b] - operationCounts[a];
        })[0];
        if (operation) {
          observations.push({
            priority: 60,
            text: "Recent mistakes are most common in " + operationLabel(operation) + ".",
            evidence: operationCounts[operation] + " recent mistake records.",
            action: "Use mistake review, then repeat a short targeted sprint."
          });
        }
      }

      function addPracticeSprintTransferObservation(observations, sessions) {
        var practice = sessions.filter(function (session) { return session.mode === "practice"; });
        var sprint = sessions.filter(function (session) { return session.mode === "sprint"; });
        if (practice.length < 2 || sprint.length < 2) return;
        var practiceAccuracy = Math.round(avg(practice.map(function (session) { return session.accuracy; })));
        var sprintAccuracy = Math.round(avg(sprint.map(function (session) { return session.accuracy; })));
        if (practiceAccuracy >= 80 && sprintAccuracy <= practiceAccuracy - 12) {
          observations.push({
            priority: 62,
            text: "Practice accuracy is stronger than sprint accuracy.",
            evidence: "Practice average " + practiceAccuracy + "%; sprint average " + sprintAccuracy + "%.",
            action: "Try one familiar sprint goal with emphasis on calm pace before speed."
          });
        }
      }

      function addPaceObservation(observations, sessions) {
        var sprint = sessions.filter(function (session) {
          return session.mode === "sprint" && Number(session.timeSpent) >= 60;
        });
        if (sprint.length < 2) return;
        var accuracy = Math.round(avg(sprint.map(function (session) { return session.accuracy; })));
        var score = Math.round(avg(sprint.map(function (session) { return session.score; })));
        if (accuracy >= 85 && score < 18) {
          observations.push({
            priority: 50,
            text: "Accuracy is solid, but sprint pace may be limiting score growth.",
            evidence: "Recent sprint average " + accuracy + "% accuracy with about " + score + " correct.",
            action: "Keep the same skill and aim for a small score increase without lowering accuracy."
          });
        }
      }

      function timesTableClassProfile(students) {
        if (!students.length) return "";
        return [
          operationTableClassProfile(students, "multiplication", "Multiplication table profile", "Class evidence by selected multiplication table."),
          operationTableClassProfile(students, "division", "Division table profile", "Class evidence by selected division table and reverse division facts.")
        ].join("");
      }

      function operationTableClassProfile(students, operation, title, intro) {
        return [
          '<section class="panel section stack">',
          '  <div><h3>' + escapeHTML(title) + '</h3><p class="muted">' + escapeHTML(intro) + '</p></div>',
          '  <table><thead><tr><th>Table</th><th>Secure</th><th>Building</th><th>Focus</th><th>No data</th><th>Average</th></tr></thead><tbody>',
          TIMES_TABLES.map(function (table) {
            var profiles = students.map(function (student) {
              return tableProfileForStudent(student.id, table, operation);
            });
            var withAccuracy = profiles.filter(function (profile) { return profile.accuracy != null; });
            var average = withAccuracy.length ? Math.round(avg(withAccuracy.map(function (profile) { return profile.accuracy; }))) + "%" : "--";
            return [
              '<tr>',
              '<td><strong>' + table + 's</strong></td>',
              '<td>' + countProfiles(profiles, "secure") + '</td>',
              '<td>' + countProfiles(profiles, "building") + '</td>',
              '<td>' + countProfiles(profiles, "focus") + '</td>',
              '<td>' + countProfiles(profiles, "none") + '</td>',
              '<td>' + average + '</td>',
              '</tr>'
            ].join("");
          }).join(""),
          '  </tbody></table>',
          '</section>'
        ].join("");
      }

      function timesTableStudentProfile(student) {
        return [
          operationTableStudentProfile(student, "multiplication", "Multiplication tables", "Multiplication evidence by selected table for " + student.alias + "."),
          operationTableStudentProfile(student, "division", "Division tables", "Division evidence by selected table for " + student.alias + ".")
        ].join("");
      }

      function operationTableStudentProfile(student, operation, title, intro) {
        return [
          '<section class="panel section stack">',
          '  <div><h3>' + escapeHTML(title) + '</h3><p class="muted">' + escapeHTML(intro) + '</p></div>',
          '  <table><thead><tr><th>Table</th><th>Proficiency</th><th>Sessions</th><th>Average accuracy</th></tr></thead><tbody>',
          TIMES_TABLES.map(function (table) {
            var profile = tableProfileForStudent(student.id, table, operation);
            return [
              '<tr>',
              '<td><strong>' + table + 's</strong></td>',
              '<td>' + proficiencyPill(profile) + '</td>',
              '<td>' + profile.sessions + '</td>',
              '<td>' + (profile.accuracy == null ? "--" : profile.accuracy + "%") + '</td>',
              '</tr>'
            ].join("");
          }).join(""),
          '  </tbody></table>',
          '</section>'
        ].join("");
      }

      function countProfiles(profiles, className) {
        return profiles.filter(function (profile) {
          return profile.className === className;
        }).length;
      }

      function addStudentForm(klass) {
        return [
          '<form class="panel section stack" data-form="add-student">',
          '  <h3>Add student</h3>',
          '  <input type="hidden" name="classId" value="' + escapeHTML(klass.id) + '">',
          '  <div class="grid two">',

          '    <label>Year level<select name="yearLevel">' + yearLevelOptions("Y4") + '</select></label>',
          '  </div>',
          '  <div class="notice small">A six-digit PIN will be generated when the student is added.</div>',
          '  <div class="tiny muted">Use the alias you want the student to enter. Do not add extra personal information.</div>',
          '  <button class="btn primary" type="submit">Add student</button>',
          '</form>'
        ].join("");
      }

      function studentImportForm(klass) {

          '<section class="panel section stack">',
          '  <div><h3>Import students</h3><p class="muted">Paste spreadsheet rows or upload a CSV/TSV export.</p></div>',
          '  <form class="stack" data-form="preview-student-import">',

          '    <label>Rows<textarea name="studentRows" data-import-textarea placeholder="First name,Last name&#10;Tia,Pretty&#10;Ava,Morgan"></textarea></label>',

          '      <button class="btn ghost" type="button" data-action="clear-student-import">Clear preview</button>',

          studentImportPreviewHTML(klass),

        if (!file) return;

        var reader = new FileReader();
        reader.onload = function () {

          if (textarea) textarea.value = String(reader.result || "");

      async function confirmStudentImport(classId) {
        var rows = readyStudentImportRows(classId);
        if (!rows.length) {
          state.message = "Error: Preview students before importing.";
          render();
          return;
        }
        var failures = [];
        var created = 0;
        var reserved = {};
        if (backendActive()) {
          for (var i = 0; i < rows.length; i += 1) {
            var remoteAlias = uniqueAliasForImport(classId, rows[i].alias, reserved);
            var remotePin = generateStudentPin();
            var addResult = await supabaseClient.rpc("create_student", {
              p_class_id: classId,
              p_alias: remoteAlias,
              p_pin: remotePin,
              p_year_level: normalizeYearLevel(rows[i].yearLevel)
            });
            if (addResult.error) {
              failures.push({
                rowNumber: rows[i].rowNumber,
                alias: remoteAlias,
                yearLevel: normalizeYearLevel(rows[i].yearLevel),
                status: "Error",
                error: addResult.error.message
              });
              continue;
            }
            var remoteStudent = Array.isArray(addResult.data) ? addResult.data[0] : addResult.data;
            if (remoteStudent && remoteStudent.id) {
              rememberGeneratedPin(remoteStudent.id, remotePin);
            }
            created += 1;
          }
          await loadRemoteDashboard();
        } else {
          var klassForImport = store.classes.find(function (item) { return item.id === classId; });
          if (!klassForImport) {
            state.message = "Error: Class not found.";
            render();
            return;
          }
          for (var j = 0; j < rows.length; j += 1) {
            var localAlias = uniqueAliasForImport(classId, rows[j].alias, reserved);
            var studentId = uid("student");
            var pin = generateStudentPin();
            store.students.push({
              id: studentId,
              classId: classId,
              teacherId: klassForImport.teacherId,
              firstName: "",
              lastName: "",
              alias: localAlias,
              yearLevel: normalizeYearLevel(rows[j].yearLevel),
              pinHash: await hashText("student:" + studentId + ":" + pin),
              createdAt: new Date().toISOString()
            });
            rememberGeneratedPin(studentId, pin);
            created += 1;
          }
          saveStore();
        }
        state.studentImportClassId = classId;
        state.studentImportRows = failures;
        state.message = "Imported " + created + " students. Generated PINs are shown in the student list until this page reloads.";
        if (failures.length) state.message += " " + failures.length + " rows need attention.";
        render();
      }

      function sessionMatchesOperation(session, operation) {
        if (operation === "all") return true;

      function filterSessions(sessions) {
        return sessions.filter(function (session) {
          var tags = session.tags || [];
          var operationOK = sessionMatchesOperation(session, state.dashboardOperation);
          var tagOK = state.dashboardTag === "all" || tags.indexOf(state.dashboardTag) >= 0 || (session.mistakes || []).some(function (m) {
            return (m.tags || []).indexOf(state.dashboardTag) >= 0;
          });
          return operationOK && tagOK;
        }).sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });

      function chartHTML(sessions, metric, title) {
        var w = 720;
        var h = 220;
        var pad = 34;
        var values = sessions.map(function (session) { return Number(session[metric]) || 0; });
        var maxValue = metric === "accuracy" ? 100 : Math.max(10, Math.max.apply(null, values));
        var minValue = 0;
        var points = values.map(function (value, index) {
          var x = sessions.length === 1 ? w / 2 : pad + (index * (w - pad * 2)) / (sessions.length - 1);
          var y = h - pad - ((value - minValue) / (maxValue - minValue || 1)) * (h - pad * 2);
          return [x, y, value, sessions[index]];
        });
        var poly = points.map(function (p) { return p[0].toFixed(1) + "," + p[1].toFixed(1); }).join(" ");
        return [
          '<div>',
          '  <div class="between"><strong>' + escapeHTML(title) + '</strong><span class="tiny muted">' + sessions.length + ' sessions</span></div>',
          '  <svg class="chart" viewBox="0 0 ' + w + ' ' + h + '" role="img" aria-label="' + escapeHTML(title) + '">',
          '    <line x1="' + pad + '" y1="' + (h - pad) + '" x2="' + (w - pad) + '" y2="' + (h - pad) + '" stroke="#d7deea" stroke-width="2"></line>',
          '    <line x1="' + pad + '" y1="' + pad + '" x2="' + pad + '" y2="' + (h - pad) + '" stroke="#d7deea" stroke-width="2"></line>',
          '    <polyline points="' + poly + '" fill="none" stroke="' + (metric === "accuracy" ? "#0f9f8f" : "#f05d4f") + '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></polyline>',
          points.map(function (p) {
            return '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="6" fill="white" stroke="' + (metric === "accuracy" ? "#0f9f8f" : "#f05d4f") + '" stroke-width="4"><title>' + escapeHTML(studentNameForSession(p[3]) + " - " + p[2] + (metric === "accuracy" ? "%" : "")) + '</title></circle>';
          }).join(""),
          '    <text x="' + pad + '" y="24" fill="#64748b" font-size="14">' + maxValue + (metric === "accuracy" ? "%" : "") + '</text>',
          '    <text x="' + pad + '" y="' + (h - 8) + '" fill="#64748b" font-size="14">0</text>',
          '  </svg>',
          '</div>'
        ].join("");
      }

      function scoreStats(sessions) {
        var ordered = sessions.slice().sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
        var scores = ordered.map(function (session) {
          return Number(session.score) || 0;
        });
        if (!scores.length) return { initial: null, high: null, median: null };
        return {
          initial: scores[0],
          high: Math.max.apply(null, scores),
          median: median(scores)
        };
      }

      function hydrateQRCodes() {

      function unique(items) {
        return Array.from(new Set(items.filter(Boolean)));

      function avg(values) {
        if (!values.length) return 0;
        return values.reduce(function (sum, value) { return sum + Number(value || 0); }, 0) / values.length;
      }

      function sum(values) {
        return values.reduce(function (total, value) { return total + Number(value || 0); }, 0);
      }

      function median(values) {
        if (!values.length) return 0;
        var sorted = values.slice().map(function (value) {
          return Number(value) || 0;
        }).sort(function (a, b) {
          return a - b;
        });
        var middle = Math.floor(sorted.length / 2);
        if (sorted.length % 2) return sorted[middle];
        return (sorted[middle - 1] + sorted[middle]) / 2;
      }

      function exportCSV(classId) {
        var klass = store.classes.find(function (item) { return item.id === classId; });

        var rows = [
          ["student", "alias", "date", "mode", "operation", "level", "attempted", "correct", "accuracy", "best_streak", "time_spent_seconds", "mistakes"]
        ].concat(sessions.map(function (s) {
          return [studentNameForSession(s), s.studentAlias, s.createdAt, s.mode, s.operation, s.levelId, s.attempted, s.correct, s.accuracy, s.bestStreak, s.timeSpent, s.mistakes.length];
        }));
        var csv = rows.map(function (row) {
          return row.map(function (cell) {
            return '"' + String(cell == null ? "" : cell).replace(/"/g, '""') + '"';
          }).join(",");
        }).join("\n");
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = (klass ? klass.name.replace(/[^a-z0-9]+/gi, "-").toLowerCase() : "class") + "-fluency-sprint.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

        var kind = form.getAttribute("data-form");
        var data = new FormData(form);
        if (state.previewMode && kind === "teacher-login") {
          store.currentTeacherId = "preview-teacher";
          state.dashboardClassId = "preview-class";
          state.view = "dashboard";
          state.message = "Preview teacher signed in.";
          render();
          return;
        }
        if (backendActive() && kind === "teacher-signup") {
          try {
            var remoteDisplayName = String(data.get("displayName") || "").trim();
            var remoteEmail = String(data.get("email") || "").trim().toLowerCase();
            var remotePassword = String(data.get("password") || "");
            var signupResult = await remoteTeacherSignup(remoteDisplayName, remoteEmail, remotePassword);
            if (signupResult.needsConfirmation) {
              state.view = "auth";
              state.message = "Check your email to confirm the teacher account, then log in.";
            } else {
              state.view = "dashboard";
              state.message = "Teacher account created.";
            }
          } catch (error) {
            state.message = "Error: " + error.message;
          }
          render();
          return;
        }
        if (backendActive() && kind === "teacher-login") {
          try {
            var backendEmail = String(data.get("email") || "").trim().toLowerCase();
            var backendPassword = String(data.get("password") || "");
            await remoteTeacherLogin(backendEmail, backendPassword);
            state.view = "dashboard";
            state.message = "Logged in.";
          } catch (error) {
            state.message = "Error: " + error.message;
          }
          render();
          return;
        }
        if (backendActive() && kind === "create-class") {
          try {
            var remoteClassName = String(data.get("className") || "").trim();
            var createResult = await supabaseClient.rpc("create_class", {
              p_name: remoteClassName
            });
            if (createResult.error) throw createResult.error;
            await loadRemoteDashboard();
            state.dashboardClassId = createResult.data.id;
            state.message = "Class created.";
          } catch (error) {
            state.message = "Error: " + error.message;
          }
          render();
          return;
        }
        if (kind === "preview-student-import") {
          var importClassId = String(data.get("classId") || "");
          var importText = String(data.get("studentRows") || "");
          var defaultImportYearLevel = normalizeYearLevel(data.get("yearLevel"));
          state.studentImportClassId = importClassId;
          state.studentImportRows = parseStudentImportText(importText, importClassId).map(function (row) {
            return Object.assign({}, row, { yearLevel: defaultImportYearLevel });
          });
          if (!state.studentImportRows.length) {
            state.message = "Error: Paste rows or upload a CSV/TSV file before previewing.";
          } else {
            var readyCount = readyStudentImportRows(importClassId).length;
            state.message = "Preview ready: " + readyCount + " students can be imported.";
          }
          render();
          return;
        }
        if (backendActive() && kind === "add-student") {
          try {
            var remoteClassId = String(data.get("classId") || "");
            var remoteAlias = cleanStudentAlias(data.get("alias"));
            var remotePin = generateStudentPin();
            var addResult = await supabaseClient.rpc("create_student", {
              p_class_id: remoteClassId,
              p_alias: remoteAlias,
              p_pin: remotePin,
              p_year_level: normalizeYearLevel(data.get("yearLevel"))
            });
            if (addResult.error) throw addResult.error;
            var remoteStudent = Array.isArray(addResult.data) ? addResult.data[0] : addResult.data;
            if (remoteStudent && remoteStudent.id) {
              rememberGeneratedPin(remoteStudent.id, remotePin);
            }
            await loadRemoteDashboard();
            state.message = generatedPinMessage("Student added", remoteStudent ? remoteStudent.alias : remoteAlias, remotePin);
          } catch (error) {
            state.message = "Error: " + error.message;
          }
          render();
          return;
        }
        if (backendActive() && kind === "update-student-year-level") {
          try {
            var yearStudentId = String(data.get("studentId") || "");
            var selectedYearLevel = normalizeYearLevel(data.get("yearLevel"));
            var yearResult = await supabaseClient.rpc("update_student_year_level", {
              p_student_id: yearStudentId,
              p_year_level: selectedYearLevel
            });
            if (yearResult.error) throw yearResult.error;
            await loadRemoteDashboard();
            state.message = "Student year level updated.";
          } catch (error) {
            state.message = "Error: " + error.message;
          }
          render();
          return;
        }
        if (backendActive() && kind === "reset-student-pin") {
          try {
            var resetStudentId = String(data.get("studentId") || "");
            var resetPin = generateStudentPin();
            var resetResult = await supabaseClient.rpc("reset_student_pin", {
              p_student_id: resetStudentId,
              p_new_pin: resetPin
            });
            if (resetResult.error) throw resetResult.error;
            var resetStudent = Array.isArray(resetResult.data) ? resetResult.data[0] : resetResult.data;
            if (resetStudent && resetStudent.id) {
              rememberGeneratedPin(resetStudent.id, resetPin);
            }
            await loadRemoteDashboard();
            state.message = generatedPinMessage("PIN regenerated", resetStudent ? resetStudent.alias : "student", resetPin);
          } catch (error) {
            state.message = "Error: " + error.message;
          }
          render();
          return;
        }
        if (kind === "teacher-signup") {
          var email = String(data.get("email") || "").trim().toLowerCase();
          var displayName = String(data.get("displayName") || "").trim();
          var password = String(data.get("password") || "");
          if (store.teachers.some(function (t) { return t.email === email; })) {
            state.message = "Error: That teacher email already exists in this local prototype.";
            render();
            return;
          }
          var t = {
            id: uid("teacher"),
            email: email,
            displayName: displayName,
            passwordHash: await hashText("teacher:" + email + ":" + password),
            createdAt: new Date().toISOString()
          };
          store.teachers.push(t);
          store.currentTeacherId = t.id;
          saveStore();
          state.view = "dashboard";
          state.message = "Teacher account created.";
          render();
          return;
        }

        if (kind === "teacher-login") {
          var loginEmail = String(data.get("email") || "").trim().toLowerCase();
          var loginPassword = String(data.get("password") || "");
          var found = store.teachers.find(function (t) { return t.email === loginEmail; });
          if (!found || found.passwordHash !== await hashText("teacher:" + loginEmail + ":" + loginPassword)) {
            state.message = "Error: Login did not match a local teacher account.";
            render();
            return;
          }
          store.currentTeacherId = found.id;
          saveStore();
          state.view = "dashboard";
          state.message = "Logged in.";
          render();
          return;
        }

        if (kind === "create-class") {
          var currentTeacher = teacher();
          if (!currentTeacher) return;
          var name = String(data.get("className") || "").trim();
          var klass = {
            id: uid("class"),
            teacherId: currentTeacher.id,
            name: name,
            code: uniqueClassCode(),
            createdAt: new Date().toISOString()
          };
          store.classes.push(klass);
          state.dashboardClassId = klass.id;
          saveStore();
          state.message = "Class created.";
          render();
          return;
        }

        if (kind === "add-student") {
          var classId = String(data.get("classId") || "");
          var alias = cleanStudentAlias(data.get("alias"));
          if (!alias) {
            state.message = "Error: Student alias is required.";
            render();
            return;
          }
          if (alias.length > 40) {
            state.message = "Error: Student alias must be 40 characters or fewer.";
            render();
            return;
          }
          var existing = studentsForClass(classId).some(function (student) {
            return student.alias.toLowerCase() === alias.toLowerCase();
          });
          if (existing) {
            state.message = "Error: That alias already exists in this class.";
            render();
            return;
          }
          var studentId = uid("student");
          var klassForStudent = store.classes.find(function (item) { return item.id === classId; });
          var pin = generateStudentPin();
          var student = {
            id: studentId,
            classId: classId,
            teacherId: klassForStudent.teacherId,
            firstName: "",
            lastName: "",
            alias: alias,
            yearLevel: normalizeYearLevel(data.get("yearLevel")),
            pinHash: await hashText("student:" + studentId + ":" + pin),
            createdAt: new Date().toISOString()
          };
          store.students.push(student);
          rememberGeneratedPin(studentId, pin);
          saveStore();
          state.message = generatedPinMessage("Student added", alias, pin);
          render();
          return;
        }

        if (kind === "reset-student-pin") {
          var resetLocalStudentId = String(data.get("studentId") || "");
          var resetLocalStudent = store.students.find(function (student) { return student.id === resetLocalStudentId; });
          if (!resetLocalStudent) {
            state.message = "Error: Student not found.";
            render();
            return;
          }
          var resetLocalPin = generateStudentPin();
          resetLocalStudent.pinHash = await hashText("student:" + resetLocalStudent.id + ":" + resetLocalPin);
          rememberGeneratedPin(resetLocalStudent.id, resetLocalPin);
          saveStore();
          state.message = generatedPinMessage("PIN regenerated", resetLocalStudent.alias, resetLocalPin);
          render();
          return;
        }

        if (kind === "update-student-year-level") {
          var localYearStudentId = String(data.get("studentId") || "");
          var localYearStudent = store.students.find(function (student) { return student.id === localYearStudentId; });
          if (!localYearStudent) {
            state.message = "Error: Student not found.";
            render();
            return;
          }
          localYearStudent.yearLevel = normalizeYearLevel(data.get("yearLevel"));
          saveStore();
          state.message = "Student year level updated.";
          render();
          return;
        }

        if (kind === "student-join") {
          if (state.previewMode) {
            var previewCode = String(data.get("code") || "").trim().toUpperCase();
            var previewAlias = String(data.get("alias") || "").trim();
            var previewClass = store.classes.find(function (item) {
              return item.code.toUpperCase() === previewCode && !item.deletedAt;
            }) || store.classes[0];
            var previewStudentMatch = studentsForClass(previewClass.id).find(function (student) {
              return student.alias.toLowerCase() === previewAlias.toLowerCase();
            }) || studentsForClass(previewClass.id)[0];
            state.student = {
              id: previewStudentMatch.id,
              alias: previewStudentMatch.alias,
              yearLevel: previewStudentMatch.yearLevel,
              classId: previewClass.id,
              teacherId: previewClass.teacherId
            };
            state.view = "student-menu";
            state.message = "Preview student joined.";
            render();
            return;
          }
          if (backendActive()) {
            try {
              var remoteCode = String(data.get("code") || "").trim().toUpperCase();
              var joinRemoteAlias = String(data.get("alias") || "").trim();
              var joinRemotePin = String(data.get("pin") || "").trim();
              var joinResult = await supabaseClient.rpc("join_student", {
                p_class_code: remoteCode,
                p_alias: joinRemoteAlias,
                p_pin: joinRemotePin
              });
              if (joinResult.error) throw joinResult.error;
              var joined = Array.isArray(joinResult.data) ? joinResult.data[0] : joinResult.data;
              state.student = {
                id: joined.student_id,
                alias: joined.alias,
                yearLevel: normalizeYearLevel(joined.year_level),
                classId: joined.class_id,
                teacherId: joined.teacher_id,
                accessToken: joined.access_token
              };
              await loadRemoteStudentHistory();
              state.view = "student-menu";
              state.message = "Welcome, " + joined.alias + ".";
            } catch (error) {
              state.message = "Error: " + error.message;
            }
            render();
            return;
          }
          var code = String(data.get("code") || "").trim().toUpperCase();
          var joinAlias = String(data.get("alias") || "").trim();
          var joinPin = String(data.get("pin") || "").trim();
          var klassJoin = store.classes.find(function (item) {
            return item.code.toUpperCase() === code && !item.deletedAt;
          });
          if (!klassJoin) {
            state.message = "Error: Class code not found.";
            render();
            return;
          }
          var studentJoin = studentsForClass(klassJoin.id).find(function (student) {
            return student.alias.toLowerCase() === joinAlias.toLowerCase();
          });
          if (!studentJoin || studentJoin.pinHash !== await hashText("student:" + studentJoin.id + ":" + joinPin)) {
            state.message = "Error: Alias and PIN did not match this class.";
            render();
            return;
          }
          state.student = {
            id: studentJoin.id,
            alias: studentJoin.alias,
            yearLevel: studentJoin.yearLevel,
            classId: klassJoin.id,
            teacherId: klassJoin.teacherId
          };
          state.view = "student-menu";
          state.message = "Welcome, " + studentJoin.alias + ".";
          render();
          return;
        }

        if (kind === "answer") {
          submitAnswer();
        }
      }

      async function handleAction(button) {
        var action = button.getAttribute("data-action");
        if (action === "preview-start") {
          enterPreview();
          return;
        }
        if (action === "preview-go") {
          previewGo(button.getAttribute("data-target"));
          return;
        }
        if (action === "exit-preview") {
          exitPreview();
          return;
        }
        if (action === "home") setView("home");
        if (action === "appearance") setView("appearance");
        if (action === "set-theme") {
          state.appearance.theme = button.getAttribute("data-theme");
          saveAppearance();
          render();
        }
        if (action === "set-keypad-size") {
          state.appearance.keypadSize = button.getAttribute("data-keypad-size");
          saveAppearance();
          render();
        }
        if (action === "student-start") setView("student-join");
        if (action === "teacher-start") {
          state.view = teacher() ? "dashboard" : "auth";
          render();
        }
        if (action === "teacher-dashboard") {
          if (backendActive() && teacher()) {
            try {
              await loadRemoteDashboard();
            } catch (error) {
              state.message = "Error: " + error.message;
            }
          }
          state.view = "dashboard";
          render();
        }
        if (action === "teacher-results") {
          if (backendActive() && teacher()) {
            try {
              await loadRemoteDashboard();
            } catch (error) {
              state.message = "Error: " + error.message;
            }
          }
          state.view = "teacher-results";
          render();
        }
        if (action === "view-student-results") {
          var resultsStudentId = button.getAttribute("data-student");
          var resultsStudent = store.students.find(function (student) { return student.id === resultsStudentId; });
          if (resultsStudent) {
            state.dashboardClassId = resultsStudent.classId;
            state.resultsStudentId = resultsStudent.id;
            state.resultsLevelId = null;
            state.resultsMode = "student";
            state.view = "teacher-results";
            render();
          }
        }
        if (action === "auth-mode") {
          state.authMode = button.getAttribute("data-mode");
          state.message = "";
          render();
        }
        if (action === "teacher-logout") {
          if (state.previewMode) {
            exitPreview();
            return;
          }
          if (backendActive()) {
            await remoteLogout();
            state.view = "home";
            state.message = "";
            render();
            return;
          }
          store.currentTeacherId = null;
          state.recentPins = {};
          saveStore();
          state.view = "home";
          render();
        }
        if (action === "student-logout") {
          if (state.previewMode) {
            state.student = null;
            state.view = "preview";
            render();
            return;
          }
          state.student = null;
          setView("home");
        }
        if (action === "select-operation") {
          state.selectedOperation = button.getAttribute("data-operation");
          var levels = LEVELS.filter(function (level) { return level.operation === state.selectedOperation; });
          var diagnosticStart = diagnosticStartLevelForOperation(currentStudentRecord(), state.selectedOperation);
          state.selectedLevelId = diagnosticStart ? diagnosticStart.id : levels[0].id;
          render();
        }
        if (action === "start-diagnostic") {
          var diagnosticOperation = button.getAttribute("data-operation") || state.selectedOperation;
          var diagnosticLevel = diagnosticStartLevelForOperation(currentStudentRecord(), diagnosticOperation);
          if (diagnosticLevel) {
            state.selectedOperation = diagnosticOperation;
            state.selectedLevelId = diagnosticLevel.id;
            state.message = "";
            startSession("sprint");
          }
        }
        if (action === "choose-avatar") {
          var avatarId = button.getAttribute("data-reward");
          var avatarItem = REWARD_AVATARS.find(function (item) { return item.id === avatarId; });
          if (avatarItem && studentCoins(currentStudentRecord()) >= avatarItem.cost) {
            saveRewardPref(state.student.id, "avatar", avatarItem.id);
            render();
          }
        }
        if (action === "choose-theme") {
          var themeId = button.getAttribute("data-reward");
          var themeItem = REWARD_THEMES.find(function (item) { return item.id === themeId; });
          if (themeItem && studentCoins(currentStudentRecord()) >= themeItem.cost) {
            saveRewardPref(state.student.id, "theme", themeItem.id);
            render();
          }
        }
        if (action === "continue-diagnostic") {
          var followUpLevel = levelById(button.getAttribute("data-level"));
          if (followUpLevel) {
            state.selectedOperation = followUpLevel.operation;
            state.selectedLevelId = followUpLevel.id;
            state.message = "";
            startSession("sprint");
          }
        }
        if (action === "select-level") {
          state.selectedLevelId = button.getAttribute("data-level");
          state.message = "";
          render();
        }
        if (action === "toggle-table") {
          toggleMultiplicationTable(Number(button.getAttribute("data-table")));
          render();
        }
        if (action === "select-all-multiplication") {
          selectAllMultiplicationFacts();
          render();
        }
        if (action === "toggle-reverse-division") {
          state.includeReverseDivision = !state.includeReverseDivision;
          state.message = "";
          render();
        }
        if (action === "open-practice-guide") {
          state.message = "";
          state.view = "practice-guide";
          render();
        }
        if (action === "start-mode") {
          if (button.getAttribute("data-mode") === "practice") {
            state.message = "";
            state.view = "practice-guide";
            render();
          } else {
            startSession(button.getAttribute("data-mode"));
          }
        }
        if (action === "begin-guided-practice") startSession("practice");
        if (action === "begin-session") {
          startSession(button.getAttribute("data-mode"));
        }
        if (action === "keypad") {
          if (!state.active) return;
          var keyValue = button.getAttribute("data-key");
          setAnswerInput(String(state.active.input || "") + keyValue);
        }
        if (action === "backspace") {
          if (!state.active) return;
          setAnswerInput(String(state.active.input || "").slice(0, -1));
        }
        if (action === "clear-answer") {
          if (!state.active) return;
          setAnswerInput("", 0);
        }
        if (action === "submit-answer") submitAnswer();
        if (action === "finish-session") finishSession();
        if (action === "student-menu") setView("student-menu");
        if (action === "retry-level") {
          if (state.results) {
            state.selectedLevelId = state.results.levelId;
            var retryLevel = levelById(state.results.levelId);
            state.selectedOperation = retryLevel.operation;
            if (state.results.practiceOptions) {
              state.multiplicationTables = normalizeTables(state.results.practiceOptions.tables);
              state.includeReverseDivision = !!state.results.practiceOptions.includeReverseDivision;
              state.includeZeroMultiplicationFacts = !!state.results.practiceOptions.includeZeroMultiplicationFacts;
            }
            startSession(state.results.mode);
          }
        }
        if (action === "review-mistakes") {
          state.reviewIndex = 0;
          state.view = "review";
          render();
        }
        if (action === "back-to-results") {
          state.view = "results";
          render();
        }
        if (action === "review-prev") {
          state.reviewIndex = Math.max(0, state.reviewIndex - 1);
          render();
        }
        if (action === "review-next") {
          state.reviewIndex += 1;
          render();
        }
        if (action === "select-class") {
          state.dashboardClassId = button.getAttribute("data-class");
          state.resultsStudentId = null;
          state.resultsLevelId = null;
          saveStore();
          render();
        }
        if (action === "results-mode") {
          state.resultsMode = button.getAttribute("data-mode");
          render();
        }
        if (action === "clear-student-import") {
          state.studentImportClassId = null;
          state.studentImportRows = [];
          state.message = "";
          render();
        }
        if (action === "confirm-student-import") {
          await confirmStudentImport(button.getAttribute("data-class"));
        }
        if (action === "rotate-code") {
          var classIdRotate = button.getAttribute("data-class");
          var klassRotate = store.classes.find(function (item) { return item.id === classIdRotate; });
          if (backendActive()) {
            if (confirm("Rotate this class code? The old code will stop working.")) {
              try {
                var rotateResult = await supabaseClient.rpc("rotate_class_code", {
                  p_class_id: classIdRotate
                });
                if (rotateResult.error) throw rotateResult.error;
                await loadRemoteDashboard();
                state.message = "Class code rotated.";
              } catch (error) {
                state.message = "Error: " + error.message;
              }
              render();
            }
            return;
          }
          if (klassRotate && confirm("Rotate this class code? The old code will stop working.")) {
            klassRotate.code = uniqueClassCode();
            klassRotate.codeRotatedAt = new Date().toISOString();
            saveStore();
            state.message = "Class code rotated.";
            render();
          }
        }
        if (action === "delete-class") {
          var classIdDelete = button.getAttribute("data-class");
          if (backendActive()) {
            if (confirm("Remove this class? Student names and aliases will be anonymised. Scores stay in class history.")) {
              try {
                var deleteClassResult = await supabaseClient.rpc("delete_class", {
                  p_class_id: classIdDelete
                });
                if (deleteClassResult.error) throw deleteClassResult.error;
                state.dashboardClassId = null;
                await loadRemoteDashboard();
                state.message = "Class removed and student details anonymised.";
              } catch (error) {
                state.message = "Error: " + error.message;
              }
              render();
            }
            return;
          }
          if (confirm("Remove this class? Student names and aliases will be anonymised. Scores stay in class history.")) {
            var klassDelete = store.classes.find(function (item) { return item.id === classIdDelete; });
            if (klassDelete) klassDelete.deletedAt = new Date().toISOString();
            store.students.forEach(function (student) {
              if (student.classId === classIdDelete) {
                student.firstName = "";
                student.lastName = "";
                student.alias = "Deleted student";
                student.pinHash = "removed";
                student.deletedAt = new Date().toISOString();
              }
            });
            store.sessions.forEach(function (session) {
              if (session.classId === classIdDelete) session.studentAlias = "Deleted student";
            });
            state.dashboardClassId = null;
            saveStore();
            state.message = "Class removed and student details anonymised.";
            render();
          }
        }
        if (action === "delete-student") {
          var studentId = button.getAttribute("data-student");
          if (backendActive()) {
            if (confirm("Remove this student? Their name and alias will be anonymised. Scores stay in class history.")) {
              try {
                var deleteStudentResult = await supabaseClient.rpc("delete_student", {
                  p_student_id: studentId
                });
                if (deleteStudentResult.error) throw deleteStudentResult.error;
                await loadRemoteDashboard();
                state.message = "Student removed and details anonymised.";
              } catch (error) {
                state.message = "Error: " + error.message;
              }
              render();
            }
            return;
          }
          if (confirm("Remove this student? Their name and alias will be anonymised. Scores stay in class history.")) {
            var studentDelete = store.students.find(function (item) { return item.id === studentId; });
            if (studentDelete) {
              studentDelete.firstName = "";
              studentDelete.lastName = "";
              studentDelete.alias = "Deleted student";
              studentDelete.pinHash = "removed";
              studentDelete.deletedAt = new Date().toISOString();
            }
            store.sessions.forEach(function (session) {
              if (session.studentId === studentId) session.studentAlias = "Deleted student";
            });
            saveStore();
            state.message = "Student removed and details anonymised.";
            render();
          }
        }
        if (action === "export-csv") {
          exportCSV(button.getAttribute("data-class"));
        }
        if (action === "print-login-cards") {
          printLoginCards();
        }
      }

      document.addEventListener("submit", function (event) {
        var form = event.target.closest("form[data-form]");
        if (!form) return;
        event.preventDefault();
        handleForm(form);
      });

      document.addEventListener("click", function (event) {
        var button = event.target.closest("[data-action]");
        if (!button) return;
        var tag = button.tagName.toLowerCase();
        if (tag === "select") return;
        if (state.active && isAnswerControlAction(button.getAttribute("data-action")) && button === pointerHandledButton && Date.now() - pointerHandledAt < 700) {
          event.preventDefault();
          return;
        }
        event.preventDefault();
        handleAction(button);
      });

      document.addEventListener("pointerdown", function (event) {
        var button = event.target.closest('[data-action="keypad"], [data-action="backspace"], [data-action="clear-answer"], [data-action="submit-answer"]');
        if (button && state.active) {
          event.preventDefault();
          updateInputFromDom();
          pointerHandledButton = button;
          pointerHandledAt = Date.now();
          handleAction(button);
        }
      });

      document.addEventListener("keydown", function (event) {
        handlePhysicalAnswerKey(event);
      });

      document.addEventListener("change", function (event) {
        var fileInput = event.target.closest("input[data-import-file]");
        if (fileInput) {
          loadStudentImportFile(fileInput.files && fileInput.files[0]);
          return;
        }
        var select = event.target.closest("select[data-action]");
        if (!select) return;
        if (select.getAttribute("data-action") === "dashboard-operation") {
          state.dashboardOperation = select.value;
          render();
        }
        if (select.getAttribute("data-action") === "dashboard-tag") {
          state.dashboardTag = select.value;
          render();
        }
        if (select.getAttribute("data-action") === "results-class") {
          state.dashboardClassId = select.value;
          state.resultsStudentId = null;
          state.resultsLevelId = null;
          saveStore();
          render();
        }
        if (select.getAttribute("data-action") === "results-student") {
          state.resultsStudentId = select.value;
          state.resultsLevelId = null;
          render();
        }
        if (select.getAttribute("data-action") === "results-level") {
          state.resultsLevelId = select.value;
          render();
        }
      });

      document.addEventListener("input", function (event) {
        if (event.target && event.target.id === "answerInput" && state.active) {
          var originalAnswer = event.target.value;
          var cleanedAnswer = sanitizeAnswerValue(originalAnswer);
          var cursorPosition = event.target.selectionStart;
          state.active.input = cleanedAnswer;
          if (cleanedAnswer !== originalAnswer) {
            event.target.value = cleanedAnswer;
            if (event.target.setSelectionRange) {
              var removedCharacters = originalAnswer.length - cleanedAnswer.length;
              var newPosition = cursorPosition == null ? cleanedAnswer.length : cursorPosition - removedCharacters;
              newPosition = Math.max(0, Math.min(newPosition, cleanedAnswer.length));
              event.target.setSelectionRange(newPosition, newPosition);
            }
          }
        }
      });

      function render() {
        applyAppearance();
        if (state.view === "home") app.innerHTML = homeView();
        if (state.view === "preview") app.innerHTML = previewView();
        if (state.view === "appearance") app.innerHTML = appearanceView();
        if (state.view === "auth") app.innerHTML = authView();
        if (state.view === "student-join") app.innerHTML = studentJoinView();
        if (state.view === "student-menu") app.innerHTML = studentMenuView();
        if (state.view === "practice-guide") app.innerHTML = practiceGuideView();
        if (state.view === "session") app.innerHTML = sessionView();
        if (state.view === "results") app.innerHTML = resultsView();
        if (state.view === "review") app.innerHTML = reviewView();
        if (state.view === "dashboard") app.innerHTML = dashboardView();
        if (state.view === "teacher-results") app.innerHTML = teacherResultsView();
        hydrateQRCodes();
      }

      applyAppearance();
      applyInitialRoute();
      render();
      initializeBackend().catch(function (error) {
        state.backendReady = true;
        state.message = "Error: Supabase setup needs attention: " + error.message;
        render();
      });
    })();
  </script>
</body>
</html>
