<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3 Times Table Pathway Prototype</title>
  <style>
    :root{--ink:#172033;--muted:#64748b;--line:#d7deea;--teal:#0f9f8f;--paper:#fffdf7;--gold:#f4b63d;--blue:#3c75d8;--radius:10px;--shadow:0 18px 42px rgba(23,32,51,.12)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:linear-gradient(135deg,#fffaf0,#f7fbff 52%,#fff7f5);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif} button,input{font:inherit} button{cursor:pointer} .shell{width:min(1120px,calc(100% - 2rem));margin:0 auto;padding:1rem 0 3rem}.topbar{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}.brand{font-weight:950}.badge{border:1px solid var(--line);border-radius:999px;padding:.35rem .65rem;background:white;color:var(--muted);font-weight:850;font-size:.84rem}.hero{text-align:center;padding:1rem 0 1.25rem}h1{font-size:clamp(2.4rem,7vw,5rem);line-height:.95;margin:.5rem 0}.lead{color:var(--muted);max-width:48rem;margin:0 auto}.layout{display:grid;grid-template-columns:minmax(14rem,18rem) 1fr;gap:1rem;align-items:start}.panel,.card{background:rgba(255,255,255,.95);border:2px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.section{padding:1rem}.stage-list{display:grid;gap:.5rem}.stage-btn{display:grid;grid-template-columns:2rem 1fr;gap:.65rem;align-items:center;width:100%;min-height:3.8rem;border:2px solid var(--line);border-radius:9px;background:white;text-align:left;padding:.6rem}.stage-btn.active{border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,159,143,.12)}.num{display:grid;place-items:center;width:2rem;height:2rem;border-radius:999px;background:#e8fbf8;color:#087b70;font-weight:950}.stage-btn.active .num{background:var(--teal);color:white}.grid{display:grid;gap:1rem}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}.card{box-shadow:none;padding:.9rem}.muted{color:var(--muted)}.small{font-size:.86rem}.visual{min-height:12rem;border:2px dashed var(--line);border-radius:9px;background:#f8fafc;padding:1rem;display:grid;place-items:center}.question{display:grid;gap:.8rem}.question-text{text-align:center;font-size:clamp(1.6rem,6vw,3.5rem);font-weight:950}.row{display:flex;justify-content:center;align-items:center;gap:.6rem;flex-wrap:wrap}.answer{width:min(100%,12rem);min-height:3.4rem;border:2px solid var(--line);border-radius:9px;text-align:center;font-size:1.5rem;font-weight:950}.btn{min-height:2.7rem;border:2px solid transparent;border-radius:9px;padding:.65rem .95rem;background:var(--ink);color:white;font-weight:900}.btn.primary{background:var(--teal)}.btn.ghost{background:white;color:var(--ink);border-color:var(--line)}.slay{border:2px solid #f3d28b;background:#fff8df;border-radius:var(--radius);padding:1rem}.feedback{text-align:center;min-height:2rem;font-weight:900}.good{color:#215b2b}.bad{color:#84251d}.dots{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}.group{display:grid;grid-template-columns:repeat(3,1rem);gap:.3rem;border:2px solid var(--line);border-radius:9px;background:white;padding:.5rem}.dot{width:1rem;height:1rem;border-radius:999px;background:var(--teal)}.sequence{font-size:1.4rem;font-weight:950;line-height:1.7;text-align:center}.factbox{text-align:center;font-size:1.4rem;font-weight:950}.mini{font-size:1.15rem;line-height:1.7;text-align:center;font-weight:850}@media(max-width:860px){.layout,.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar"><div class="brand">Fluency Sprint prototype</div><span class="badge">3s pathway test</span></div>
    <section class="hero"><h1>Learn the 3 times table</h1><p class="lead">Build it. Count it. Spot patterns. Use smart facts. Recall it. Use it for division. Keep it fresh.</p></section>
    <section class="layout">
      <aside class="panel section"><h2>Steps</h2><div id="stageList" class="stage-list"></div></aside>
      <section class="grid">
        <div class="panel section"><h2 id="stageTitle"></h2><p id="stagePurpose" class="muted"></p><span id="supportBadge" class="badge"></span></div>
        <div class="cards"><div class="card"><h3>Your job</h3><p id="goal" class="muted"></p></div><div class="card"><h3>Help</h3><p id="support" class="muted"></p></div></div>
        <div class="panel section"><h3>Picture or pattern</h3><div id="visual" class="visual"></div></div>
        <div class="panel section question"><h3>Try one</h3><p id="hint" class="muted"></p><div id="questionText" class="question-text"></div><div class="row"><input id="answer" class="answer" inputmode="numeric" aria-label="Answer"><button id="check" class="btn primary">Check</button><button id="newQ" class="btn ghost">New example</button></div><div id="feedback" class="feedback" aria-live="polite"></div></div>
        <div class="slay"><strong>Mr Slay says...</strong><p id="slay"></p></div>
      </section>
    </section>
  </main>
  <script>
    const stages=[
      {t:'Build it',sub:'Make groups and arrays',support:'Lots of help',purpose:'Make the 3s with pictures first.',goal:'Make groups of 3. Count the total.',sup:'Groups and dots stay on the screen. No timer.',hint:'Count the groups of 3.',slay:'Start with the picture. Every group has 3. Count each group, then find the total.',q(){const n=pick([2,3,4,5,6]);return {p:`${n} groups of 3 = __`,a:3*n,type:'groups',n};}},
      {t:'Count it',sub:'3, 6, 9...',support:'Lots of help',purpose:'Learn the 3s counting pattern.',goal:'Count by 3 and keep your place.',sup:'The 3s pattern is shown to help you.',hint:'Use the 3s count: 3, 6, 9...',slay:'Each count is one more group of 3. Do not rush. Keep your place.',q(){const n=pick([4,5,6,7,8,9]);return {p:`What is the ${ord(n)} number when counting by 3?`,a:n*3,type:'sequence',n};}},
      {t:'See the pattern',sub:'Rows, jumps and products',support:'Lots of help',purpose:'See how the 3s look in different ways.',goal:'Use rows, jumps or the pattern to find the answer.',sup:'The picture or number line is still there.',hint:'Use the picture. Each jump adds 3.',slay:'A fact can be shown as groups, rows, or jumps. Same answer, different picture.',q(){const n=pick([3,4,5,6,7]);return {p:`${n} jumps of 3 = __`,a:n*3,type:'line',n};}},
      {t:'Use a smart strategy',sub:'Build from known facts',support:'Some help',purpose:'Work out harder facts without counting from the start.',goal:'Use a fact you know to find a nearby fact.',sup:'A helpful fact is shown.',hint:'Use the known fact first.',slay:'Do not count all the way from 3. Use a fact you already know and build from there.',q(){const n=pick([6,8,9,11,12]);return {p:`${n} × 3 = __`,a:n*3,type:'strategy',n};}},
      {t:'Say it in order',sub:'1 × 3, 2 × 3, 3 × 3...',support:'Some help',purpose:'Practise the 3s facts in order.',goal:'Say the table in order and connect each fact to the answer.',sup:'You can use the last fact and add 3.',hint:'Use the last fact. Add one more 3.',slay:'The order helps you learn the table. But order is practice, not the finish line.',q(){ordered=ordered%12+1;return {p:`${ordered} × 3 = __`,a:ordered*3,type:'array',n:ordered};}},
      {t:'Answer shuffled facts',sub:'No set order',support:'Less help',purpose:'Answer 3s facts when they are mixed up.',goal:'Answer without needing to start from the beginning of the table.',sup:'A hint is there if you need it after thinking.',hint:'Use a known fact to help.',slay:'This is where real recall starts. Build from a known fact if it is not automatic yet.',q(){const n=pick([3,4,6,7,8,9,11,12]);return {p:`${n} × 3 = __`,a:n*3,type:'minimal',n};}},
      {t:'Mix it with other tables',sub:'3s with known facts',support:'Challenge',purpose:'Tell 3s apart from other facts you know.',goal:'Check the table before you answer.',sup:'The mix starts small so it is not overloaded.',hint:'Look at the table first. Is it a 3s fact?',slay:'Mixed facts make you choose the right strategy. First name the table, then answer.',q(){const facts=[[3,4],[3,8],[2,6],[5,7],[10,4],[3,9],[4,3]];const f=pick(facts);return {p:`${f[0]} × ${f[1]} = __`,a:f[0]*f[1],type:'mixed',n:f[1],f};}},
      {t:'Use division facts',sub:'3s fact families',support:'Stretch',purpose:'Use 3s facts for division and missing numbers.',goal:'Turn division back into multiplication.',sup:'The fact family can help you.',hint:'Ask: 3 times what makes this number?',slay:'Division is asking for a missing fact. 24 ÷ 3 means 3 times what equals 24?',q(){const n=pick([4,5,6,7,8,9,10,11,12]);return Math.random()<.5?{p:`${n*3} ÷ 3 = __`,a:n,type:'family',n}:{p:`3 × __ = ${n*3}`,a:n,type:'family',n};}},
      {t:'Keep it automatic',sub:'Review after time',support:'Maintenance',purpose:'Keep the 3s ready for later.',goal:'Answer facts you have already learnt so they stay fresh.',sup:'This is short review, not a new lesson.',hint:'Try to recall it first. If it is slow, use a strategy.',slay:'A fact is not finished after one sprint. Bring it back later so your brain keeps it.',q(){const n=pick([3,4,6,7,8,9,11,12]);return {p:`Review: ${n} × 3 = __`,a:n*3,type:'maintenance',n};}}
    ];
    let active=0,current=null,ordered=0;
    const $=id=>document.getElementById(id),pick=a=>a[Math.floor(Math.random()*a.length)],ord=n=>({1:'1st',2:'2nd',3:'3rd'}[n]||`${n}th`);
    function dots(n){return Array.from({length:n}).map(()=>'<span class="dot"></span>').join('')}
    function renderStages(){ $('stageList').innerHTML=stages.map((s,i)=>`<button class="stage-btn ${i===active?'active':''}" data-i="${i}"><span class="num">${i+1}</span><span><strong>${s.t}</strong><br><span class="small muted">${s.sub}</span></span></button>`).join(''); document.querySelectorAll('.stage-btn').forEach(b=>b.onclick=()=>{active=Number(b.dataset.i);newQuestion();render();});}
    function visual(q){
      if(q.type==='groups')return `<div class="dots">${Array.from({length:q.n}).map(()=>`<div class="group">${dots(3)}</div>`).join('')}</div>`;
      if(q.type==='array')return `<div class="group" style="grid-template-columns:repeat(3,1rem)">${dots(q.n*3)}</div><p class="muted small">${q.n} rows of 3</p>`;
      if(q.type==='sequence')return '<div class="sequence">3, 6, 9, 12, 15, 18, 21, 24, 27, 30, 33, 36</div>';
      if(q.type==='line')return `<div class="sequence">${Array.from({length:q.n+1}).map((_,i)=>i*3).join(' → ')}</div>`;
      if(q.type==='strategy')return strategyVisual(q.n);
      if(q.type==='family')return `<div class="factbox">3 × ${q.n} = ${q.n*3}<br>${q.n*3} ÷ 3 = ${q.n}<br>${q.n*3} ÷ ${q.n} = 3</div>`;
      if(q.type==='mixed')return `<div class="mini">First name the table.<br>${q.f[0]} × ${q.f[1]}<br>Then choose the strategy.</div>`;
      if(q.type==='maintenance')return '<div class="mini">Review keeps facts fresh.<br>Recall first. Use a strategy if needed.</div>';
      return '<div class="muted">Try this one without the picture first.</div>'; }
    function strategyVisual(n){
      if(n===6)return '<div class="mini">5 × 3 = 15<br>One more group of 3 is 18.<br>6 × 3 = 18</div>';
      if(n===8)return '<div class="mini">4 × 3 = 12<br>Double it.<br>8 × 3 = 24</div>';
      if(n===9)return '<div class="mini">10 × 3 = 30<br>Take away one group of 3.<br>9 × 3 = 27</div>';
      if(n===11)return '<div class="mini">10 × 3 = 30<br>Add one group of 3.<br>11 × 3 = 33</div>';
      return '<div class="mini">10 × 3 = 30<br>Add 2 × 3 = 6.<br>12 × 3 = 36</div>';
    }
    function newQuestion(){const s=stages[active];current=s.q();$('questionText').textContent=current.p;$('answer').value='';$('feedback').textContent='';$('feedback').className='feedback';$('visual').innerHTML=visual(current);}
    function render(){const s=stages[active];renderStages();$('stageTitle').textContent=`${active+1}. ${s.t}`;$('stagePurpose').textContent=s.purpose;$('supportBadge').textContent=s.support;$('goal').textContent=s.goal;$('support').textContent=s.sup;$('hint').textContent=s.hint;$('slay').textContent=s.slay;}
    function check(){const v=Number($('answer').value.trim());if(!Number.isFinite(v)){setFeedback('Type a number first.',false);return}setFeedback(v===current.a?'Correct. Good thinking.':`Not yet. The answer is ${current.a}.`,v===current.a)}
    function setFeedback(text,good){$('feedback').textContent=text;$('feedback').className='feedback '+(good?'good':'bad')}
    $('check').onclick=check;$('newQ').onclick=()=>{newQuestion();render()};$('answer').addEventListener('keydown',e=>{if(e.key==='Enter')check()});newQuestion();render();
  </script>
</body>
</html>
