name: Patch Mr Slay addition
on:
  push:
    branches: [feature-mr-slay-targeted-advice]
    paths: [.github/workflows/patch-mr-slay-addition.yml]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature-mr-slay-targeted-advice
      - name: Patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text(encoding='utf-8-sig')
          old='''        general: {\n          title: "Mr Slay says...",\n          bubble: "Pick a strategy before you rush.",\n          board: [\n            "1. Read the question",\n            "2. Choose a fact you know",\n            "3. Check your answer"\n          ],\n          prompt: "Try the next one carefully first. Speed can come after accuracy."\n        },\n'''
          add=old+'''\n        additionGeneral: { title: "Addition strategy", bubble: "Name the strategy before you calculate.", board: ["Look for a friendly pair, near double, bridge, or compensation.", "Choose the quickest pathway.", "Then calculate and check."], prompt: "Do not just count if a known structure is hiding in the fact." },\n        additionFriends10: { title: "Friends of 10", bubble: "A friend of 10 is the missing part that finishes 10.", board: ["4 + ? = 10", "4 needs 6 to make 10", "4 + 6 = 10"], prompt: "Say the number you can see, then name its friend." },\n        additionEnding5: { title: "Facts ending in 5", bubble: "Use ones-digit pairs that make 5 or 15.", board: ["1 + 4 = 5", "2 + 3 = 5", "6 + 9 = 15", "7 + 8 = 15", "27 + 8: 7 + 8 = 15, so 20 + 15 = 35"], prompt: "Look at the ones digits first. Do they pair to 5 or 15?" },\n        additionBridge10: { title: "Bridge to 10", bubble: "Make 10 first, then add what is left.", board: ["8 + 6", "8 needs 2 to make 10", "6 = 2 + 4", "10 + 4 = 14"], prompt: "How many to make 10? What is left over?" },\n'''
          if 'additionEnding5' not in s:
            if old not in s: raise SystemExit('helper anchor not found')
            s=s.replace(old,add,1)
          anchor='''      function guideExamplesHTML(examples) {\n        return '<div class="example-strip">' + examples.map(function (example) {\n          var raw = String(example == null ? "" : example);\n          var lines = raw.split(/\\n+/).map(function (line) { return line.trim(); }).filter(Boolean);\n          if (lines.length <= 1) {\n            return '<div class="example-box">' + escapeHTML(raw) + '</div>';\n          }\n          return '<div class="example-box stepped-example">' + lines.map(function (line, index) {\n            var cls = index === 0 ? "example-title" : (index === lines.length - 1 ? "example-result" : "example-step");\n            return '<div class="' + cls + '">' + escapeHTML(line) + '</div>';\n          }).join("") + '</div>';\n        }).join("") + '</div>';\n      }\n'''
          funcs=anchor+'''\n      function mrSlayHelperForLevel(level) {\n        var tags = level ? level.tags || [] : [];\n        if (level && level.operation === "addition") {\n          if (tags.indexOf("ending5") >= 0) return MR_SLAY_HELPERS.additionEnding5;\n          if (tags.indexOf("bridge") >= 0) return MR_SLAY_HELPERS.additionBridge10;\n          if (tags.indexOf("friends10") >= 0) return MR_SLAY_HELPERS.additionFriends10;\n          return MR_SLAY_HELPERS.additionGeneral;\n        }\n        if (level && level.operation === "multiplication") return MR_SLAY_HELPERS.multiplicationGeneral;\n        if (level && level.operation === "division") return MR_SLAY_HELPERS.divisionGeneral;\n        return MR_SLAY_HELPERS.general;\n      }\n      function mrSlayLessonPanelHTML(level) {\n        var h = mrSlayHelperForLevel(level);\n        return ['<section class="panel section coach-panel">','<img src="assets/mr-slay-npc.jpg" alt="" style="width:76px;height:76px;border-radius:999px;object-fit:cover;border:3px solid var(--gold);background:white">','<div class="stack"><div><span class="pill">Mr Slay</span><h3>'+escapeHTML(h.title||"Strategy coach")+'</h3></div>','<div class="notice small"><strong>'+escapeHTML(h.bubble||"Choose a strategy before you calculate.")+'</strong></div>',h.prompt?'<p class="muted">'+escapeHTML(h.prompt)+'</p>':'','</div></section>'].join("");\n      }\n'''
          if 'function mrSlayHelperForLevel(level)' not in s:
            if anchor not in s: raise SystemExit('guide anchor not found')
            s=s.replace(anchor,funcs,1)
          g_old='''          tablePractice ? '<section class="panel section stack student-menu-panel">' + tablePracticePanel() + '</section>' : '',\n          '  <section class="guide-grid">',\n'''
          g_new='''          tablePractice ? '<section class="panel section stack student-menu-panel">' + tablePracticePanel() + '</section>' : '',\n          mrSlayLessonPanelHTML(level),\n          '  <section class="guide-grid">',\n'''
          if 'mrSlayLessonPanelHTML(level),' not in s:
            if g_old not in s: raise SystemExit('grid anchor not found')
            s=s.replace(g_old,g_new,1)
          sh_old='''        if (active.levelOperation === "multiplication" || (active.question && active.question.operation === "multiplication")) {\n          var table = mrSlayTableFromQuestion(active);\n          return MR_SLAY_HELPERS["times" + table] || MR_SLAY_HELPERS.multiplicationGeneral;\n        }\n\n        return MR_SLAY_HELPERS.general;\n'''
          sh_new='''        if (active.levelOperation === "multiplication" || (active.question && active.question.operation === "multiplication")) {\n          var table = mrSlayTableFromQuestion(active);\n          return MR_SLAY_HELPERS["times" + table] || MR_SLAY_HELPERS.multiplicationGeneral;\n        }\n\n        if (active.levelOperation === "addition" || (active.question && active.question.operation === "addition")) {\n          return mrSlayHelperForLevel(levelById(active.levelId));\n        }\n\n        return MR_SLAY_HELPERS.general;\n'''
          if sh_old not in s: raise SystemExit('session helper anchor not found')
          s=s.replace(sh_old,sh_new,1)
          p.write_text('\ufeff'+s,encoding='utf-8')
          PY
      - name: Syntax check
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html=Path('index.html').read_text(encoding='utf-8-sig')
          Path('/tmp/site.js').write_text(re.search(r'<script>\s*([\s\S]*?)\s*</script>',html).group(1),encoding='utf-8')
          PY
          node --check /tmp/site.js
      - name: Commit
        run: |
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add Mr Slay targeted addition advice"
          git push origin feature-mr-slay-targeted-advice
