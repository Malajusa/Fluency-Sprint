name: Patch stepped addition examples

on:
  workflow_dispatch:
  push:
    branches:
      - feature-lesson-panel
    paths:
      - .github/workflows/patch-stepped-addition-examples.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature-lesson-panel

      - name: Patch addition guide examples
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8-sig')

          if 'Update 07A: full Mr Slay addition/subtraction lesson bank' in text:
              raise SystemExit('Refusing to patch: broken Update 07A marker is present.')

          changed = False

          def replace_once(old, new, label):
              global text, changed
              if new in text:
                  print(f'Already patched: {label}')
                  return
              if old not in text:
                  raise SystemExit(f'Could not find expected block: {label}')
              text = text.replace(old, new, 1)
              changed = True
              print(f'Patched: {label}')

          css_old = '''    .example-box {\r\n      border: 2px solid var(--line);\r\n      border-radius: 8px;\r\n      background: #f8fafc;\r\n      padding: 0.85rem;\r\n      font-size: 1.2rem;\r\n      font-weight: 950;\r\n      text-align: center;\r\n    }\r\n'''
          if css_old not in text:
              css_old = css_old.replace('\r\n', '\n')
          css_new = css_old + '''\n    .example-box.stepped-example {\n      text-align: left;\n      font-size: 0.98rem;\n      line-height: 1.35;\n      display: grid;\n      gap: 0.35rem;\n    }\n\n    .example-title {\n      font-weight: 950;\n      color: var(--teal-dark);\n    }\n\n    .example-step {\n      font-weight: 800;\n      color: var(--ink);\n    }\n\n    .example-result {\n      margin-top: 0.2rem;\n      padding-top: 0.35rem;\n      border-top: 1px solid var(--line);\n      font-weight: 950;\n      color: var(--blue);\n    }\n'''
          replace_once(css_old, css_new, 'stepped example CSS')

          fn_old = '''      function guideExamplesHTML(examples) {\r\n        return '<div class="example-strip">' + examples.map(function (example) {\r\n          return '<div class="example-box">' + escapeHTML(example) + '</div>';\r\n        }).join("") + '</div>';\r\n      }\r\n'''
          if fn_old not in text:
              fn_old = fn_old.replace('\r\n', '\n')
          fn_new = '''      function guideExamplesHTML(examples) {\n        return '<div class="example-strip">' + examples.map(function (example) {\n          var raw = String(example == null ? "" : example);\n          var lines = raw.split(/\\n+/).map(function (line) { return line.trim(); }).filter(Boolean);\n          if (lines.length <= 1) {\n            return '<div class="example-box">' + escapeHTML(raw) + '</div>';\n          }\n          return '<div class="example-box stepped-example">' + lines.map(function (line, index) {\n            var cls = index === 0 ? "example-title" : (index === lines.length - 1 ? "example-result" : "example-step");\n            return '<div class="' + cls + '">' + escapeHTML(line) + '</div>';\n          }).join("") + '</div>';\n        }).join("") + '</div>';\n      }\n'''
          replace_once(fn_old, fn_new, 'stepped example renderer')

          friend_old = '''            examples: [\r\n              addVisible + " + ? = " + friendGuideTarget + ", so ? = " + addPartner,\r\n              "? + " + addPartner + " = " + friendGuideTarget + ", so ? = " + addVisible,\r\n              addVisible + " + " + addPartner + " = " + friendGuideTarget\r\n            ],\r\n'''
          if friend_old not in text:
              friend_old = friend_old.replace('\r\n', '\n')
          friend_new = '''            examples: [\n              "Friendly pair strategy\\n" + addVisible + " + ? = " + friendGuideTarget + "\\n" + addVisible + " needs " + addPartner + " to make " + friendGuideTarget + "\\n" + addVisible + " + " + addPartner + " = " + friendGuideTarget,\n              "Reordering strategy\\n? + " + addPartner + " = " + friendGuideTarget + "\\nThe known part is " + addPartner + "\\n" + addPartner + " needs " + addVisible + "\\n? = " + addVisible,\n              "Check with subtraction\\n" + friendGuideTarget + " - " + addVisible + "\\nThe missing part is " + addPartner + "\\n" + addVisible + " + " + addPartner + " = " + friendGuideTarget\n            ],\n'''
          replace_once(friend_old, friend_new, 'friends-of-target addition examples')

          bridge_old = '''            examples: ["8 + 6 = 8 + 2 + 4", "9 + 5 = 9 + 1 + 4", "7 + 8 = 7 + 3 + 5"],\r\n'''
          if bridge_old not in text:
              bridge_old = bridge_old.replace('\r\n', '\n')
          bridge_new = '''            examples: [\n              "Bridge to 10\\n8 + 6\\n8 needs 2 to make 10\\n6 = 2 + 4\\n10 + 4 = 14",\n              "Bridge to 10\\n9 + 5\\n9 needs 1 to make 10\\n5 = 1 + 4\\n10 + 4 = 14",\n              "Bridge to 10\\n7 + 8\\n7 needs 3 to make 10\\n8 = 3 + 5\\n10 + 5 = 15"\n            ],\n'''
          replace_once(bridge_old, bridge_new, 'bridge-to-10 addition examples')

          add_old = '''        if (level.operation === "addition") {\r\n          return {\r\n            meaning: "Addition combines parts to make a total.",\r\n            strategy: "Look for pairs that make 10, doubles, or near doubles.",\r\n            examples: ["6 + 4 = 10", "7 + 7 = 14", "8 + 9 = 17"],\r\n            guided: [\r\n              "Find the friend of 10 or double if there is one.",\r\n              "Use the known fact first.",\r\n              "Add any leftover amount."\r\n            ],\r\n            independent: "Practise when you can spot the helpful pattern before calculating."\r\n          };\r\n        }\r\n'''
          if add_old not in text:
              add_old = add_old.replace('\r\n', '\n')
          add_new = '''        if (level.operation === "addition") {\n          return {\n            meaning: "Addition combines parts to make a total. Fluency means choosing the most efficient strategy before answering.",\n            strategy: "Choose from friendly pairs, near doubles, jump strategy, split strategy, compensation, or reordering.",\n            examples: [\n              "Friendly pair strategy\\n6 + 4\\n6 needs 4 to make 10\\n6 + 4 = 10",\n              "Near doubles strategy\\n8 + 9\\n8 + 8 = 16\\n9 is 1 more than 8\\n16 + 1 = 17",\n              "Compensation strategy\\n35 + 9\\nThink 9 = 10 - 1\\n35 + 10 = 45\\n45 - 1 = 44"\n            ],\n            guided: [\n              "If the numbers make 10 or 100, group them first.",\n              "If the numbers are close, use a double or near double.",\n              "If one number is near a friendly number, bump it, calculate, then adjust.",\n              "If the numbers are larger, split them by place value and recombine."\n            ],\n            independent: "Practise when you can name the strategy before calculating."\n          };\n        }\n'''
          replace_once(add_old, add_new, 'general addition strategy guide')

          if changed:
              path.write_text('\ufeff' + text, encoding='utf-8')
          else:
              print('No changes needed.')
          PY

      - name: Syntax check
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8-sig')
          match = re.search(r'<script>\s*([\s\S]*?)\s*</script>', html)
          if not match:
              raise SystemExit('Could not find script block')
          Path('/tmp/fluency-sprint-script.js').write_text(match.group(1), encoding='utf-8')
          PY
          node --check /tmp/fluency-sprint-script.js

      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add stepped addition worked examples"
          git push origin feature-lesson-panel
