name: Apply multiplication Mr Slay patch

on:
  push:
    branches:
      - feature/multiplication-mr-slay-advice
    paths:
      - '.github/workflows/apply-multiplication-mr-slay-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.ref_name == 'feature/multiplication-mr-slay-advice'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/multiplication-mr-slay-advice

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch index.html
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let html = fs.readFileSync(path, 'utf8');

          const helperBlock = `

        multiplicationEasyTables: {
          title: "2s, 5s and 10s",
          bubble: "Use the table structure before you calculate.",
          board: [
            "2s: double the other number.",
            "5s: answers end in 0 or 5.",
            "10s: think place value."
          ],
          prompt: "Name the table first, then use its shortcut."
        },

        multiplicationEnding5: {
          title: "5-times-table products",
          bubble: "When multiplying by 5, the answer ends in 0 or 5.",
          board: [
            "5 x 7 = 35",
            "Odd x 5 ends in 5.",
            "5 x 8 = 40",
            "Even x 5 ends in 0."
          ],
          prompt: "Use the final digit to check whether the product makes sense."
        },

        multiplication3and4: {
          title: "3s and 4s",
          bubble: "Use grouping for 3s and double-double for 4s.",
          board: [
            "3 x 6 = 18",
            "4 x 6 = double 6, then double again",
            "6 -> 12 -> 24"
          ],
          prompt: "Decide whether this is a 3s fact or a 4s fact before answering."
        },

        multiplicationDerivedFacts: {
          title: "6s, 7s, 8s and 9s",
          bubble: "Build harder facts from easier facts.",
          board: [
            "6s: double the 3s fact.",
            "7s: use 5 groups and 2 groups.",
            "8s: double three times.",
            "9s: use 10 groups, then subtract one group."
          ],
          prompt: "Do not guess. Build the fact from a fact you already know."
        },

        multiplicationCustomTables: {
          title: "Chosen times tables",
          bubble: "Use the strategy that matches the table you selected.",
          board: [
            "Find the table.",
            "Choose its shortcut.",
            "Check with the related fact."
          ],
          prompt: "Pause long enough to choose the right table strategy."
        },`;

          if (!html.includes('multiplicationEasyTables')) {
            const helperPattern = /(        multiplicationGeneral: \{[\s\S]*?        \},\r?\n\r?\n)(        times0: \{)/;
            if (!helperPattern.test(html)) throw new Error('Could not find multiplication helper insertion point.');
            html = html.replace(helperPattern, '$1' + helperBlock + '\n\n$2');
          }

          const oldRouting = '        if (level && level.operation === "multiplication") return MR_SLAY_HELPERS.multiplicationGeneral;';
          const newRouting = `        if (level && level.operation === "multiplication") {
          if (tags.indexOf("customTables") >= 0) return MR_SLAY_HELPERS.multiplicationCustomTables;
          if (tags.indexOf("times6") >= 0 || tags.indexOf("times7") >= 0 || tags.indexOf("times8") >= 0 || tags.indexOf("times9") >= 0) return MR_SLAY_HELPERS.multiplicationDerivedFacts;
          if (tags.indexOf("times3") >= 0 || tags.indexOf("times4") >= 0) return MR_SLAY_HELPERS.multiplication3and4;
          if (tags.indexOf("ending5") >= 0 || tags.indexOf("times5") >= 0) return MR_SLAY_HELPERS.multiplicationEnding5;
          if (tags.indexOf("times2") >= 0 || tags.indexOf("times10") >= 0) return MR_SLAY_HELPERS.multiplicationEasyTables;
          return MR_SLAY_HELPERS.multiplicationGeneral;
        }`;

          if (html.includes(oldRouting)) {
            html = html.replace(oldRouting, newRouting);
          } else if (html.includes('level.operation === "multiplication"') && html.includes('multiplicationDerivedFacts')) {
            console.log('Multiplication routing already present.');
          } else {
            throw new Error('Could not find multiplication routing to replace.');
          }

          fs.writeFileSync(path, html);
          console.log('Patched targeted multiplication Mr Slay guide advice.');
          NODE

      - name: Commit patch
        run: |
          git diff -- index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No index.html changes to commit"
          else
            git commit -m "Add targeted Mr Slay advice for multiplication"
            git push
          fi
