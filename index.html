<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fluency Sprint</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #64748b;
      --line: #d7deea;
      --paper: #fffdf7;
      --panel: #ffffff;
      --teal: #0f9f8f;
      --teal-dark: #087b70;
      --coral: #f05d4f;
      --coral-dark: #c43f34;
      --gold: #f4b63d;
      --green: #46a758;
      --blue: #3c75d8;
      --shadow: 0 18px 42px rgba(23, 32, 51, 0.12);
      --radius: 8px;
      --body-bg:
        radial-gradient(circle at top left, rgba(244, 182, 61, 0.22), transparent 32rem),
        linear-gradient(135deg, #fffaf0 0%, #f7fbff 52%, #fff7f5 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--body-bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body[data-theme="ocean"] {
      --ink: #0e2a3b;
      --muted: #496776;
      --line: #b9d8e6;
      --teal: #007f95;
      --teal-dark: #005d70;
      --coral: #e76f51;
      --coral-dark: #b84c32;
      --gold: #f2c94c;
      --body-bg:
        radial-gradient(circle at top left, rgba(0, 127, 149, 0.2), transparent 30rem),
        linear-gradient(135deg, #eefcff 0%, #f8fbff 50%, #fff7ed 100%);
    }

    body[data-theme="forest"] {
      --ink: #173122;
      --muted: #52695c;
      --line: #c7dccd;
      --teal: #2f855a;
      --teal-dark: #276749;
      --coral: #c05621;
      --coral-dark: #9c4221;
      --gold: #ecc94b;
      --body-bg:
        radial-gradient(circle at top left, rgba(72, 187, 120, 0.2), transparent 30rem),
        linear-gradient(135deg, #f0fff4 0%, #f7fafc 52%, #fffaf0 100%);
    }

    body[data-theme="sunset"] {
      --ink: #332018;
      --muted: #755c51;
      --line: #ead1c5;
      --teal: #1f8a8a;
      --teal-dark: #146a6a;
      --coral: #d94f4f;
      --coral-dark: #a93a3a;
      --gold: #f6ad55;
      --body-bg:
        radial-gradient(circle at top left, rgba(246, 173, 85, 0.24), transparent 30rem),
        linear-gradient(135deg, #fff7ed 0%, #fff5f5 50%, #eefcff 100%);
    }

    body[data-theme="bright"] {
      --ink: #182136;
      --muted: #56627a;
      --line: #cfd8ff;
      --teal: #0f9f8f;
      --teal-dark: #087b70;
      --coral: #ef476f;
      --coral-dark: #b83257;
      --gold: #ffd166;
      --body-bg:
        radial-gradient(circle at top left, rgba(255, 209, 102, 0.28), transparent 30rem),
        linear-gradient(135deg, #fffdf7 0%, #f0fbff 45%, #fff0f6 100%);
    }

    body[data-theme="contrast"] {
      --ink: #05070d;
      --muted: #182033;
      --line: #05070d;
      --teal: #005fcc;
      --teal-dark: #003f88;
      --coral: #b00020;
      --coral-dark: #7a0015;
      --gold: #f5b700;
      --green: #006b3d;
      --blue: #003fbd;
      --shadow: none;
      --body-bg: #ffffff;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    a {
      color: inherit;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem clamp(1rem, 3vw, 2rem);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .brand-mark {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 8px;
      background: var(--teal);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(15, 159, 143, 0.25);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1rem 0 3rem;
    }

    .hero {
      text-align: center;
      padding: clamp(1.5rem, 5vw, 4rem) 0 2rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0.75rem;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 0.94;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.05;
      margin-bottom: 0.6rem;
    }

    h3 {
      margin-bottom: 0.4rem;
      font-size: 1.1rem;
    }

    .lead {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 42rem;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      gap: 1rem;
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .tile {
      width: 100%;
      min-height: 11rem;
      padding: 1.25rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      text-align: left;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      touch-action: manipulation;
    }

    .tile:hover,
    .tile:focus-visible {
      transform: translateY(-2px);
      border-color: var(--teal);
      box-shadow: 0 14px 28px rgba(23, 32, 51, 0.12);
      outline: none;
    }

    .iconbox {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 8px;
      display: grid;
      place-items: center;
      margin-bottom: 0.9rem;
      background: #e8fbf8;
      color: var(--teal-dark);
      font-size: 1.35rem;
      font-weight: 900;
    }

    .tile:nth-child(2) .iconbox {
      background: #fff0ec;
      color: var(--coral-dark);
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 0.86rem;
    }

    .tiny {
      font-size: 0.76rem;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .section {
      padding: 1.1rem;
    }

    .btn {
      min-height: 2.75rem;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 0.65rem 0.95rem;
      background: var(--ink);
      color: white;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      text-decoration: none;
    }

    .btn.primary {
      background: var(--teal);
      color: white;
    }

    .btn.warn {
      background: var(--coral);
      color: white;
    }

    .btn.gold {
      background: var(--gold);
      color: #3b2d04;
    }

    .btn.ghost {
      background: white;
      color: var(--ink);
      border-color: var(--line);
    }

    .btn.icon {
      width: 2.65rem;
      padding: 0;
      flex: 0 0 auto;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 2rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .proficiency {
      display: inline-flex;
      align-items: center;
      min-height: 1.9rem;
      padding: 0.3rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .proficiency.secure {
      border-color: #b6e4bd;
      background: #ecfff0;
      color: #215b2b;
    }

    .proficiency.building {
      border-color: #f3d28b;
      background: #fff8df;
      color: #5f4608;
    }

    .proficiency.focus {
      border-color: #ffc7bd;
      background: #fff1ef;
      color: #84251d;
    }

    .proficiency.none {
      border-color: #d7deea;
      background: #f8fafc;
      color: #64748b;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .tab {
      border: 2px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--ink);
      padding: 0.55rem 0.85rem;
      font-weight: 900;
      min-height: 2.75rem;
      touch-action: manipulation;
    }

    .tab.active {
      border-color: var(--teal);
      background: #e8fbf8;
      color: var(--teal-dark);
    }

    .appearance-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .appearance-choice {
      min-height: 5.25rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 0.75rem;
      display: grid;
      grid-template-columns: 2.4rem minmax(0, 1fr);
      align-items: center;
      gap: 0.7rem;
      text-align: left;
      font-weight: 900;
    }

    .appearance-choice.active {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(15, 159, 143, 0.12);
    }

    body[data-theme="contrast"] .tab.active,
    body[data-theme="contrast"] .appearance-choice.active {
      background: var(--ink);
      color: white;
      box-shadow: none;
    }

    .swatch {
      width: 2.35rem;
      height: 2.35rem;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: linear-gradient(135deg, #0f9f8f 0 50%, #f4b63d 50% 100%);
    }

    .swatch.ocean {
      background: linear-gradient(135deg, #007f95 0 50%, #f2c94c 50% 100%);
    }

    .swatch.forest {
      background: linear-gradient(135deg, #2f855a 0 50%, #c05621 50% 100%);
    }

    .swatch.sunset {
      background: linear-gradient(135deg, #d94f4f 0 50%, #f6ad55 50% 100%);
    }

    .swatch.bright {
      background: linear-gradient(135deg, #ef476f 0 50%, #ffd166 50% 100%);
    }

    .swatch.contrast {
      background: linear-gradient(135deg, #05070d 0 50%, #ffffff 50% 100%);
    }

    .table-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(4.6rem, 1fr));
      gap: 0.55rem;
    }

    .check-choice {
      min-height: 3.25rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 0.6rem 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .check-choice input {
      width: 1.25rem;
      min-height: 1.25rem;
      accent-color: var(--teal);
      flex: 0 0 auto;
    }

    .check-choice.active {
      border-color: var(--teal);
      background: #e8fbf8;
      color: var(--teal-dark);
    }

    body[data-theme="contrast"] .check-choice.active {
      background: var(--ink);
      color: white;
    }

    label {
      display: grid;
      gap: 0.35rem;
      color: var(--ink);
      font-weight: 850;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 3rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0.65rem 0.75rem;
      outline: none;
    }

    textarea {
      min-height: 9rem;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 4px rgba(15, 159, 143, 0.12);
    }

    .notice {
      border: 2px solid #f3d28b;
      background: #fff8df;
      color: #5f4608;
      border-radius: var(--radius);
      padding: 0.8rem;
    }

    .success {
      border-color: #b6e4bd;
      background: #ecfff0;
      color: #215b2b;
    }

    .danger {
      border-color: #ffc7bd;
      background: #fff1ef;
      color: #84251d;
    }

    .level-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .level {
      min-height: 5.6rem;
      border: 2px solid var(--line);
      background: white;
      border-radius: var(--radius);
      padding: 0.85rem;
      text-align: left;
      touch-action: manipulation;
    }

    .level.active {
      border-color: var(--coral);
      box-shadow: 0 0 0 4px rgba(240, 93, 79, 0.12);
    }

    .level-code {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 900;
    }

    .practice-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(18rem, 24rem);
      gap: 1rem;
      align-items: start;
    }

    .question {
      text-align: center;
      padding: clamp(1.2rem, 4vw, 2.5rem);
    }

    .question-text {
      font-size: clamp(3.2rem, 11vw, 7.4rem);
      font-weight: 950;
      line-height: 1;
      margin: 1rem 0;
      letter-spacing: 0;
    }

    .answer-input {
      font-size: clamp(2rem, 8vw, 4rem);
      text-align: center;
      font-weight: 950;
      min-height: 5rem;
      max-width: 18rem;
      margin: 0 auto;
      touch-action: manipulation;
      caret-color: transparent;
      pointer-events: none;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
      user-select: none;
      -webkit-user-select: none;
    }

    .key {
      min-height: 4.8rem;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: white;
      font-size: 1.55rem;
      font-weight: 950;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .student-shell {
      padding-top: 0.75rem;
    }

    .student-join-card {
      max-width: 44rem;
      margin: 0 auto;
      width: 100%;
    }

    .student-menu-panel {
      gap: 1.15rem;
    }

    .action-row .btn {
      flex: 1 1 13rem;
    }

    .session-shell {
      padding-bottom: 1.25rem;
      padding-bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
    }

    .session-practice {
      align-items: stretch;
    }

    .session-practice .question,
    .keypad-panel {
      height: 100%;
    }

    .keypad-panel {
      justify-content: start;
    }

    .result-actions .tile {
      min-height: 8.5rem;
    }

    .key.enter {
      grid-column: span 3;
      background: var(--teal);
      color: white;
      border-color: var(--teal);
    }

    body[data-keypad-size="large"] .answer-input {
      min-height: 5.8rem;
      max-width: 22rem;
    }

    body[data-keypad-size="large"] .keypad {
      gap: 0.85rem;
    }

    body[data-keypad-size="large"] .key {
      min-height: 5.8rem;
      font-size: 1.85rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .stat {
      padding: 0.8rem;
      border: 2px solid var(--line);
      background: white;
      border-radius: var(--radius);
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 0.7rem;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #f7fafc;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(15rem, 22rem) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .class-list {
      display: grid;
      gap: 0.55rem;
    }

    .class-button {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      text-align: left;
      padding: 0.75rem;
    }

    .class-button.active {
      border-color: var(--teal);
      background: #e8fbf8;
    }

    .chart {
      width: 100%;
      min-height: 14rem;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
      overflow: hidden;
    }

    .empty {
      min-height: 10rem;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 1rem;
      border: 2px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.65);
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      padding: 1rem;
    }

    .print-sheet {
      display: none;
    }

    .login-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.8rem;
    }

    .login-card {
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: white;
      padding: 0.9rem;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 7rem;
      gap: 0.8rem;
      align-items: center;
      min-height: 9rem;
    }

    .qr-slot {
      width: 6.5rem;
      height: 6.5rem;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: white;
      overflow: hidden;
    }

    .qr-slot img,
    .qr-slot svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .pin-line {
      border-bottom: 2px solid var(--ink);
      display: inline-block;
      min-width: 5.5rem;
      height: 1.15rem;
      vertical-align: middle;
    }

    .preview-strip {
      margin: 0 clamp(1rem, 3vw, 2rem) 1rem;
      padding: 0.7rem;
      border: 2px solid #c6d7ff;
      border-radius: var(--radius);
      background: #eef4ff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .preview-strip strong {
      color: #244a93;
    }

    .preview-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .preview-nav button {
      min-height: 2rem;
      border: 1px solid #adc2f4;
      border-radius: 999px;
      background: white;
      color: #244a93;
      padding: 0.35rem 0.6rem;
      font-weight: 850;
      font-size: 0.78rem;
    }

    @media (max-width: 860px) {
      .grid.two,
      .grid.three,
      .grid.four,
      .appearance-grid,
      .level-list,
      .practice-layout,
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar {
        align-items: flex-start;
      }

      .toolbar {
        justify-content: flex-start;
      }
    }

    @media (min-width: 768px) and (max-width: 1180px) {
      .shell {
        width: min(100% - 1.5rem, 1040px);
        padding: 0.75rem 0 2rem;
      }

      .topbar {
        padding: 0.75rem 1rem;
      }

      .tile {
        min-height: 8.5rem;
        padding: 1rem;
      }

      .btn,
      .tab {
        min-height: 3rem;
        padding: 0.7rem 0.95rem;
      }

      .tabs {
        gap: 0.6rem;
      }

      .level-list {

        return {

        };

      function loadStore() {
        try {
          var raw = localStorage.getItem(STORE_KEY);
          if (!raw) return defaultStore();
          var parsed = JSON.parse(raw);
          return Object.assign(defaultStore(), parsed);
        } catch (error) {
          return defaultStore();
        }
      }

      function defaultAppearance() {
        return {
          theme: "classic",
          keypadSize: "normal"
        };
      }

      function optionExists(options, id) {
        return options.some(function (option) {
          return option.id === id;
        });
      }

      function normalizeAppearance(value) {
        var fallback = defaultAppearance();
        var theme = value && optionExists(APPEARANCE_THEMES, value.theme) ? value.theme : fallback.theme;
        var keypadSize = value && optionExists(KEYPAD_SIZES, value.keypadSize) ? value.keypadSize : fallback.keypadSize;
        return {
          theme: theme,
          keypadSize: keypadSize
        };
      }

      function loadAppearance() {
        try {
          return normalizeAppearance(JSON.parse(localStorage.getItem(APPEARANCE_KEY) || "{}"));
        } catch (error) {
          return defaultAppearance();
        }
      }

      function saveAppearance() {
        state.appearance = normalizeAppearance(state.appearance);
        localStorage.setItem(APPEARANCE_KEY, JSON.stringify(state.appearance));
        applyAppearance();
      }

        var appearance = normalizeAppearance(state.appearance);
        document.body.setAttribute("data-theme", appearance.theme);
        document.body.setAttribute("data-keypad-size", appearance.keypadSize);
      }

        store.lastClassId = state.dashboardClassId;

          throw result.error;

        if (result.data) {

        if (!backendActive()) return;
        var classesResult = await supabaseClient
          .from("classes")
          .select("*")
          .is("deleted_at", null)
          .order("created_at", { ascending: true });
        if (classesResult.error) throw classesResult.error;
        state.remoteClasses = (classesResult.data || []).map(normalizeClass);

        var classIds = state.remoteClasses.map(function (item) { return item.id; });
        if (!state.dashboardClassId && state.remoteClasses.length) {
          state.dashboardClassId = state.remoteClasses[0].id;
        }

        if (!classIds.length) {
          state.remoteStudents = [];
          state.remoteSessions = [];
          return;
        }

        var studentsResult = await supabaseClient
          .from("students")
          .select("id,class_id,teacher_id,first_name,last_name,alias,created_at,deleted_at")
          .in("class_id", classIds)
          .is("deleted_at", null)
          .order("created_at", { ascending: true });
        if (studentsResult.error) throw studentsResult.error;
        state.remoteStudents = (studentsResult.data || []).map(normalizeStudent);

        var sessionsResult = await supabaseClient
          .from("sessions")
          .select("*, mistakes(*)")
          .in("class_id", classIds)
          .order("created_at", { ascending: false })
          .limit(300);
        if (sessionsResult.error) throw sessionsResult.error;
        state.remoteSessions = (sessionsResult.data || []).map(normalizeSession);

          p_student_id: state.student.id,

        var studentSessions = (result.data || []).map(normalizeSession);
        state.remoteSessions = state.remoteSessions.filter(function (session) {
          return session.studentId !== state.student.id;

        }

      function escapeHTML(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");

      function todayKey(dateValue) {
        var d = dateValue ? new Date(dateValue) : new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
      }

      function daysAgo(dateValue) {
        if (!dateValue) return 9999;
        var then = new Date(dateValue).getTime();
        return Math.floor((Date.now() - then) / 86400000);
      }

      function formatDateTime(dateValue) {

      }

      function choice(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function shufflePair(a, b) {
        return Math.random() > 0.5 ? [a, b] : [b, a];
      }

      function normalizeTables(tables) {
        var seen = {};
        var selected = (Array.isArray(tables) ? tables : []).map(function (table) {
          return Number(table);
        }).filter(function (table) {
          return TIMES_TABLES.indexOf(table) >= 0 && !seen[table] && (seen[table] = true);
        });
        if (!selected.length) selected = [6, 7];
        return TIMES_TABLES.filter(function (table) {
          return selected.indexOf(table) >= 0;
        });
      }

      function currentMultiplicationOptions() {
        return {
          tables: normalizeTables(state.multiplicationTables),
          includeReverseDivision: !!state.includeReverseDivision
        };
      }

      function tableTags(tables) {
        return normalizeTables(tables).map(function (table) {
          return "times" + table;
        });
      }

      function customMultiplicationTags(options) {
        var settings = options || currentMultiplicationOptions();
        var tags = ["multiplication", "customTables"].concat(tableTags(settings.tables));
        if (settings.includeReverseDivision) tags = tags.concat(["division", "reverseDivision"]);
        return tags;
      }

      function tableListLabel(tables) {
        var labels = normalizeTables(tables).map(function (table) {
          return table + "s";
        });
        if (labels.length === 1) return labels[0];
        return labels.slice(0, -1).join(", ") + " and " + labels[labels.length - 1];
      }

      function customMultiplicationLevelName(options) {
        var settings = options || currentMultiplicationOptions();
        var label = "Chosen tables: " + tableListLabel(settings.tables);
        if (settings.includeReverseDivision) label += " with reverse division";
        return label;
      }

      function toggleMultiplicationTable(table) {
        var selected = normalizeTables(state.multiplicationTables);
        var index = selected.indexOf(table);
        if (index >= 0) {
          if (selected.length === 1) {
            state.message = "Choose at least one times table.";
            return;
          }
          selected.splice(index, 1);
        } else if (TIMES_TABLES.indexOf(table) >= 0) {
          selected.push(table);
        }
        state.multiplicationTables = normalizeTables(selected);
        state.message = "";
      }

      function levelById(id) {
        return LEVELS.find(function (level) { return level.id === id; }) || LEVELS[0];
      }

        return op ? op.label : id;

      async function hashText(text) {
        if (window.crypto && window.crypto.subtle && window.TextEncoder) {
          var bytes = new TextEncoder().encode(text);
          var digest = await window.crypto.subtle.digest("SHA-256", bytes);
          return Array.from(new Uint8Array(digest)).map(function (b) {
            return b.toString(16).padStart(2, "0");
          }).join("");
        }
        try {
          return "demo-" + btoa(unescape(encodeURIComponent(text)));
        } catch (error) {
          return "demo-" + String(text).split("").reverse().join("");
        }
      }

      function randomClassCode() {
        var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        var out = [];
        for (var group = 0; group < 3; group += 1) {
          var chunk = "";
          for (var i = 0; i < 3; i += 1) {
            chunk += chars[rand(0, chars.length - 1)];
          }
          out.push(chunk);
        }
        return out.join("-");
      }

      function uniqueClassCode() {
        var code = randomClassCode();
        while (store.classes.some(function (item) { return item.code === code && !item.deletedAt; })) {
          code = randomClassCode();
        }
        return code;
      }

      function question(text, answer, operation, tags) {
        return {
          text: text,
          answer: answer,
          operation: operation,
          tags: tags || []
        };
      }

      function generateCustomMultiplicationQuestion(options) {
        var settings = options || currentMultiplicationOptions();
        var tables = normalizeTables(settings.tables);
        var factor = choice(tables);
        var other = rand(0, 12);
        var tags = customMultiplicationTags(settings);
        if (settings.includeReverseDivision && Math.random() > 0.5) {
          return question((factor * other) + " / " + factor, other, "division", tags);
        }
        var ordered = shufflePair(factor, other);
        return question(ordered[0] + " x " + ordered[1], factor * other, "multiplication", tags);
      }

      function generateQuestion(levelId, options) {
        var level = levelById(levelId);
        var id = level.id;

        if (id === "A1") {
          var sumA1 = rand(2, 10);
          var aA1 = rand(0, sumA1);
          return question(aA1 + " + " + (sumA1 - aA1), sumA1, "addition", level.tags);
        }

        if (id === "A2") {
          var pairA2 = choice([[1, 9], [2, 8], [3, 7], [4, 6], [5, 5]]);
          var orderedA2 = shufflePair(pairA2[0], pairA2[1]);
          if (Math.random() > 0.5) return question(orderedA2[0] + " + ? = 10", orderedA2[1], "addition", level.tags);
          return question("? + " + orderedA2[0] + " = 10", orderedA2[1], "addition", level.tags);
        }

        if (id === "A3") {
          var knownA3 = rand(1, 9);
          var missingA3 = 10 - knownA3;
          if (Math.random() > 0.5) return question(knownA3 + " + ? = 10", missingA3, "addition", level.tags);
          return question("? + " + knownA3 + " = 10", missingA3, "addition", level.tags);
        }

        if (id === "A4") {
          var sumA4 = rand(6, 20);
          var aA4 = rand(0, sumA4);
          return question(aA4 + " + " + (sumA4 - aA4), sumA4, "addition", level.tags);
        }

        if (id === "A5") {
          var targetA5 = choice([5, 15, 25, 35]);
          var aA5 = rand(Math.max(0, targetA5 - 20), targetA5);
          return question(aA5 + " + " + (targetA5 - aA5), targetA5, "addition", level.tags);
        }

        if (id === "A6") {
          var aA6 = rand(6, 9);
          var bA6 = rand(10 - aA6 + 1, 9);
          return question(aA6 + " + " + bA6, aA6 + bA6, "addition", level.tags);
        }

        if (id === "A7") return generateQuestion(choice(["A1", "A2", "A4", "A5", "A6"]));

        if (id === "S1") {
          var topS1 = rand(1, 10);
          var subS1 = rand(0, topS1);
          return question(topS1 + " - " + subS1, topS1 - subS1, "subtraction", level.tags);
        }

        if (id === "S2") {
          var subS2 = rand(1, 9);
          return question("10 - " + subS2, 10 - subS2, "subtraction", level.tags);
        }

        if (id === "S3") {
          var resultS3 = rand(1, 9);
          if (Math.random() > 0.5) return question("10 - ? = " + resultS3, 10 - resultS3, "subtraction", level.tags);
          return question("? - " + (10 - resultS3) + " = " + resultS3, 10, "subtraction", level.tags);
        }

        if (id === "S4") {
          var topS4 = rand(5, 20);
          var subS4 = rand(0, topS4);
          return question(topS4 + " - " + subS4, topS4 - subS4, "subtraction", level.tags);
        }

        if (id === "S5") {
          var targetS5 = choice([5, 15, 25]);
          var subS5 = rand(1, 20);
          return question((targetS5 + subS5) + " - " + subS5, targetS5, "subtraction", level.tags);
        }

        if (id === "S6") {
          var topS6 = rand(11, 20);
          var answerS6 = rand(1, 9);
          var subThroughTen = topS6 - answerS6;
          return question(topS6 + " - " + subThroughTen, answerS6, "subtraction", level.tags);
        }

        if (id === "S7") return generateQuestion(choice(["S1", "S2", "S4", "S5", "S6"]));

        if (id === "M1") {
          var factorM1 = choice([2, 5, 10]);
          var otherM1 = rand(0, 12);
          var orderedM1 = shufflePair(factorM1, otherM1);
          return question(orderedM1[0] + " x " + orderedM1[1], factorM1 * otherM1, "multiplication", level.tags);
        }

        if (id === "M2") {
          var otherM2 = rand(0, 12);
          var orderedM2 = shufflePair(5, otherM2);
          return question(orderedM2[0] + " x " + orderedM2[1], 5 * otherM2, "multiplication", level.tags);
        }

        if (id === "M3") {
          var factorM3 = 5;
          var otherM3 = rand(1, 12);
          var orderedM3 = shufflePair(factorM3, otherM3);
          return question(orderedM3[0] + " x " + orderedM3[1], factorM3 * otherM3, "multiplication", level.tags);
        }

        if (id === "M4") {
          var factorM4 = choice([3, 4]);
          var otherM4 = rand(0, 12);
          var orderedM4 = shufflePair(factorM4, otherM4);
          return question(orderedM4[0] + " x " + orderedM4[1], factorM4 * otherM4, "multiplication", level.tags);
        }

        if (id === "M5") {
          var factorM5 = choice([6, 7, 8, 9]);
          var otherM5 = rand(0, 12);
          var orderedM5 = shufflePair(factorM5, otherM5);
          return question(orderedM5[0] + " x " + orderedM5[1], factorM5 * otherM5, "multiplication", level.tags);
        }

        if (id === "M6") {
          var aM6 = rand(0, 12);
          var bM6 = rand(0, 12);
          return question(aM6 + " x " + bM6, aM6 * bM6, "multiplication", level.tags);
        }

        if (id === "M7") return generateCustomMultiplicationQuestion(options);

        if (id === "D1") {
          var divisorD1 = choice([2, 5, 10]);
          var quotientD1 = rand(0, 12);
          return question((divisorD1 * quotientD1) + " / " + divisorD1, quotientD1, "division", level.tags);
        }

        if (id === "D2") {
          var quotientD2 = rand(0, 12);
          return question((5 * quotientD2) + " / 5", quotientD2, "division", level.tags);
        }

        if (id === "D3") {
          var divisorD3 = choice([5, 10]);
          var quotientD3 = rand(0, 12);
          return question((divisorD3 * quotientD3) + " / " + divisorD3, quotientD3, "division", level.tags);
        }

        if (id === "D4") {
          var divisorD4 = rand(2, 12);
          var quotientD4 = rand(1, 12);
          return question((divisorD4 * quotientD4) + " / " + divisorD4, quotientD4, "division", level.tags);
        }

        if (id === "D5") return generateQuestion(choice(["D1", "D2", "D3", "D4"]));

        if (id === "X1") return generateQuestion(choice(["A1", "S1"]));
        if (id === "X2") return generateQuestion(choice(["A2", "A3", "S2", "S3"]));
        if (id === "X3") return generateQuestion(choice(["A5", "S5", "M2", "M3", "D2"]));
        if (id === "X4") return generateQuestion(choice(["M1", "D1", "D3"]));
        if (id === "X5") return generateQuestion(choice(["A1", "A2", "S1", "S2", "M1", "D1"]));
        if (id === "X6") return generateQuestion(choice(["A4", "A6", "S4", "S6", "M4", "M5", "D4"]));

        return generateQuestion("A1");
      }

      function makeStudentAlias(firstName, lastName) {
        var first = String(firstName || "").trim();
        var last = String(lastName || "").trim();
        var initial = first ? first.charAt(0).toUpperCase() : "";
        return (initial + " " + last).trim() || "Student";
      }

      function cleanStudentAlias(value) {
        return String(value || "").trim().replace(/\s+/g, " ");
      }

      function splitImportLine(line) {
        if (line.indexOf("\t") >= 0) return line.split("\t");
        var cells = [];
        var current = "";
        var quoted = false;
        for (var i = 0; i < line.length; i += 1) {
          var char = line.charAt(i);
          var next = line.charAt(i + 1);
          if (char === '"' && quoted && next === '"') {
            current += '"';
            i += 1;
          } else if (char === '"') {
            quoted = !quoted;
          } else if (char === "," && !quoted) {
            cells.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        cells.push(current);
        return cells;
      }

      function normalizeImportCell(value) {
        return String(value || "").replace(/\uFEFF/g, "").trim();
      }

      function importHeaderMap(cells) {
        var lowered = cells.map(function (cell) {
          return normalizeImportCell(cell).toLowerCase();
        });
        var firstIndex = lowered.findIndex(function (cell) {
          return /(^|\s)(first|given|preferred)(\s|_|-|$)/.test(cell);
        });
        var lastIndex = lowered.findIndex(function (cell) {
          return /(^|\s)(last|surname|family)(\s|_|-|$)/.test(cell);
        });
        var nameIndex = lowered.findIndex(function (cell) {
          return firstIndex < 0 && lastIndex < 0 && /(^|\s)(student|name|full name)(\s|_|-|$)/.test(cell);
        });
        if (firstIndex < 0 && lastIndex < 0 && nameIndex < 0) return null;
        return {
          firstIndex: firstIndex,
          lastIndex: lastIndex,
          nameIndex: nameIndex
        };
      }

      function firstInitial(value) {
        var match = String(value || "").trim().match(/[A-Za-z0-9]/);
        return match ? match[0].toUpperCase() : "";
      }

      function aliasFromNameParts(firstName, lastName, fullName) {
        var first = normalizeImportCell(firstName);
        var last = normalizeImportCell(lastName);
        if (first || last) return (firstInitial(first) + firstInitial(last)).trim();
        var words = normalizeImportCell(fullName).split(/[\s,]+/).filter(Boolean);
        if (!words.length) return "";
        if (words.length === 1) return firstInitial(words[0]);
        return firstInitial(words[0]) + firstInitial(words[words.length - 1]);
      }

      function aliasFromImportCells(cells, header) {
        var values = cells.map(normalizeImportCell);
        if (header) {
          return aliasFromNameParts(
            header.firstIndex >= 0 ? values[header.firstIndex] : "",
            header.lastIndex >= 0 ? values[header.lastIndex] : "",
            header.nameIndex >= 0 ? values[header.nameIndex] : ""
          );
        }
        var nonEmpty = values.filter(Boolean);
        if (!nonEmpty.length) return "";
        if (nonEmpty.length === 1) return aliasFromNameParts("", "", nonEmpty[0]);
        return aliasFromNameParts(nonEmpty[0], nonEmpty[1], "");
      }

      function uniqueAliasForImport(classId, baseAlias, reserved) {
        var base = cleanStudentAlias(baseAlias).toUpperCase().slice(0, 36) || "S";
        var used = reserved || {};
        var existing = {};
        studentsForClass(classId).forEach(function (student) {
          existing[String(student.alias || "").toLowerCase()] = true;
        });
        var alias = base;
        var count = 2;
        while (existing[alias.toLowerCase()] || used[alias.toLowerCase()]) {
          alias = base + count;
          count += 1;
        }
        used[alias.toLowerCase()] = true;
        return alias;
      }

      function parseStudentImportText(text, classId) {
        var lines = String(text || "").split(/\r?\n/);
        var parsedRows = lines.map(function (line, index) {
          return {
            rowNumber: index + 1,
            cells: splitImportLine(line).map(normalizeImportCell)
          };
        }).filter(function (row) {
          return row.cells.some(Boolean);
        });
        if (!parsedRows.length) return [];
        var header = importHeaderMap(parsedRows[0].cells);
        var dataRows = header ? parsedRows.slice(1) : parsedRows;
        var reserved = {};
        return dataRows.map(function (row) {
          var baseAlias = aliasFromImportCells(row.cells, header);
          if (!baseAlias) {
            return {
              rowNumber: row.rowNumber,
              alias: "",
              status: "Skipped",
              error: "No initials found"
            };
          }
          return {
            rowNumber: row.rowNumber,
            alias: uniqueAliasForImport(classId, baseAlias, reserved),
            status: "Ready",
            error: ""
          };
        });
      }

      function uniqueLocalAlias(classId, firstName, lastName) {
        var base = makeStudentAlias(firstName, lastName);
        var alias = base;
        var count = 2;
        while (studentsForClass(classId).some(function (student) {
          return String(student.alias || "").toLowerCase() === alias.toLowerCase();
        })) {
          alias = base + " " + count;
          count += 1;
        }
        return alias;
      }

      function focusAnswer(position) {
        var input = document.getElementById("answerInput");
        if (input) {
          input.focus();
          if (position != null && input.setSelectionRange) {
            var safePosition = Math.max(0, Math.min(position, input.value.length));
            input.setSelectionRange(safePosition, safePosition);
          }
        }
      }

      function sanitizeAnswerValue(value) {
        return String(value || "").replace(/[^\d-]/g, "").slice(0, 6);
      }

      function updateInputFromDom() {
        var input = document.getElementById("answerInput");
        if (input && state.active) state.active.input = sanitizeAnswerValue(input.value);
      }

      function answerEditState() {
        var input = document.getElementById("answerInput");
        if (!input) return null;
        var value = sanitizeAnswerValue(input.value);
        var start = input.selectionStart == null ? value.length : input.selectionStart;
        var end = input.selectionEnd == null ? value.length : input.selectionEnd;
        return {
          value: value,
          start: Math.max(0, Math.min(start, value.length)),
          end: Math.max(0, Math.min(end, value.length))
        };
      }

      function setAnswerInput(value, caretPosition) {
        if (!state.active) return;
        var cleaned = sanitizeAnswerValue(value);
        state.active.input = cleaned;
        var input = document.getElementById("answerInput");
        if (input) {
          input.value = cleaned;
          return;
        }
        render();

      function isAnswerControlAction(action) {
        return action === "keypad" || action === "backspace" || action === "clear-answer" || action === "submit-answer";
      }

      function handlePhysicalAnswerKey(event) {
        if (!state.active) return false;
        var target = event.target;
        var inAnswer = target && target.id === "answerInput";
        var typingElsewhere = target && /^(INPUT|TEXTAREA|SELECT)$/.test(target.tagName || "") && !inAnswer;
        if (typingElsewhere) return false;

        if (/^\d$/.test(event.key)) {
          event.preventDefault();
          setAnswerInput(String(state.active.input || "") + event.key);
          return true;
        }

        if (event.key === "-" && !String(state.active.input || "").includes("-")) {
          event.preventDefault();
          setAnswerInput("-" + String(state.active.input || ""));
          return true;
        }

        if (event.key === "Backspace" || event.key === "Delete") {
          event.preventDefault();
          setAnswerInput(String(state.active.input || "").slice(0, -1));
          return true;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          submitAnswer();
          return true;
        }

        if (event.key === "Escape") {
          event.preventDefault();
          setAnswerInput("", 0);
          return true;
        }

        return false;
      }

      function submitAnswer() {
        if (!state.active) return;
        updateInputFromDom();
        var active = state.active;
        var raw = active.input.trim();
        if (!raw) {
          active.feedback = "Type an answer first.";
          render();
          return;
        }
        var submitted = Number(raw);
        var q = active.question;
        if (submitted === q.answer) {
          var correctedAfterRetry = active.pendingWrong != null;
          active.correct += 1;
          active.attempted += 1;
          active.streak += 1;
          active.bestStreak = Math.max(active.bestStreak, active.streak);
          if (correctedAfterRetry) {
            active.mistakes.push({
              question: q.text,
              studentAnswer: active.pendingWrong,
              correctAnswer: q.answer,
              operation: q.operation,
              levelId: active.levelId,
              recovered: true,
              tags: q.tags
            });
            active.pendingWrong = null;
          }
          active.input = "";
          nextQuestion();
          return;
        }
        if (active.tries === 0) {
          active.attempted += 1;
          active.streak = 0;
          active.tries = 1;
          active.pendingWrong = raw;
          active.feedback = "Try once more.";
          active.input = "";
          render();
          return;
        }
        active.attempted += 1;
        active.streak = 0;
        active.mistakes.push({
          question: q.text,
          studentAnswer: active.pendingWrong ? active.pendingWrong + ", then " + raw : raw,
          correctAnswer: q.answer,
          operation: q.operation,
          levelId: active.levelId,
          recovered: false,
          tags: q.tags
        });
        active.pendingWrong = null;
        active.feedback = "Answer: " + q.answer;
        active.input = "";
        render();
        setTimeout(nextQuestion, 800);
      }

      function nextQuestion() {
        if (!state.active) return;
        state.active.question = generateQuestion(state.active.levelId, state.active.practiceOptions);
        state.active.tries = 0;
        state.active.pendingWrong = null;
        state.active.feedback = "";
        state.active.input = "";
        render();
      }

      async function finishSession() {
        if (!state.active) return;
        stopTimer();
        var active = state.active;
        var level = levelById(active.levelId);
        if (active.pendingWrong != null) {
          active.mistakes.push({
            question: active.question.text,
            studentAnswer: active.pendingWrong,
            correctAnswer: active.question.answer,
            operation: active.question.operation,
            levelId: active.levelId,
            recovered: false,
            tags: active.question.tags
          });
          active.pendingWrong = null;
        }
        var timeSpent = active.mode === "sprint" ? 100 - Math.max(active.timeLeft || 0, 0) : Math.round((Date.now() - active.startedAt) / 1000);
        var accuracy = active.attempted ? Math.round((active.correct / active.attempted) * 100) : 0;
        var session = {
          id: uid("session"),
          studentId: state.student ? state.student.id : null,
          studentAlias: state.student ? state.student.alias : "Guest",
          classId: state.student ? state.student.classId : null,
          teacherId: state.student ? state.student.teacherId : null,
          createdAt: new Date().toISOString(),
          mode: active.mode,
          operation: level.operation,
          levelId: active.levelId,
          levelName: active.levelName,
          tags: active.sessionTags || level.tags,
          practiceOptions: active.practiceOptions,
          attempted: active.attempted,
          correct: active.correct,
          accuracy: accuracy,
          bestStreak: active.bestStreak,
          timeSpent: timeSpent,
          score: active.correct,
          mistakes: active.mistakes
        };
        if (backendActive() && state.student && state.student.accessToken) {
          var result = await supabaseClient.rpc("submit_student_session", {
            p_student_id: state.student.id,
            p_access_token: state.student.accessToken,
            p_mode: session.mode,
            p_operation: session.operation,
            p_level_id: session.levelId,
            p_level_name: session.levelName,
            p_tags: session.tags,
            p_attempted: session.attempted,
            p_correct: session.correct,
            p_accuracy: session.accuracy,
            p_best_streak: session.bestStreak,
            p_time_spent: session.timeSpent,
            p_score: session.score,
            p_mistakes: session.mistakes
          });
          if (result.error) {
            session.saveError = result.error.message;
          } else {
            session.synced = true;
            session.id = result.data || session.id;
            state.remoteSessions = state.remoteSessions.filter(function (item) {
              return item.id !== session.id;
            }).concat([session]);
          }
        } else if (state.student) {
          store.sessions.push(session);
          saveStore();
        }
        state.results = session;
        state.active = null;
        state.view = "results";
        render();
      }

      function sessionHasTag(session, tag) {
        if ((session.tags || []).indexOf(tag) >= 0) return true;
        return (session.mistakes || []).some(function (mistake) {
          return (mistake.tags || []).indexOf(tag) >= 0;
        });
      }

      function sessionsWithTag(sessions, tag) {
        return sessions.filter(function (session) {

      function proficiencyForSessions(sessions) {
        if (!sessions.length) return { label: "No data", className: "none", sessions: 0, accuracy: null };
        var accuracy = Math.round(avg(sessions.map(function (session) { return session.accuracy; })));
        if (sessions.length >= 3 && accuracy >= 90) return { label: "Secure", className: "secure", sessions: sessions.length, accuracy: accuracy };
        if (sessions.length >= 2 && accuracy >= 75) return { label: "Building", className: "building", sessions: sessions.length, accuracy: accuracy };
        return { label: "Focus", className: "focus", sessions: sessions.length, accuracy: accuracy };
      }

      function timesTableClassProfile(students) {
        if (!students.length) return "";
        return [

      function loadStudentImportFile(file) {
        if (!file) return;
        if (!window.FileReader) {
          alert("File import is not available in this browser. Paste the rows instead.");
          return;
        }
        var reader = new FileReader();
        reader.onload = function () {
          var textarea = document.querySelector("[data-import-textarea]");
          if (textarea) textarea.value = String(reader.result || "");
        };
        reader.onerror = function () {
          alert("Could not read that file. Export as CSV or paste the rows instead.");

        reader.readAsText(file);

      async function confirmStudentImport(classId) {
        var rows = readyStudentImportRows(classId);
        if (!rows.length) {
          state.message = "Error: Preview students before importing.";
          render();
          return;
        }
        var failures = [];
        var created = 0;
        var reserved = {};
        if (backendActive()) {
          for (var i = 0; i < rows.length; i += 1) {
            var remoteAlias = uniqueAliasForImport(classId, rows[i].alias, reserved);
            var remotePin = generateStudentPin();
            var addResult = await supabaseClient.rpc("create_student", {
              p_class_id: classId,
              p_alias: remoteAlias,
              p_pin: remotePin
            });
            if (addResult.error) {
              failures.push({
                rowNumber: rows[i].rowNumber,
                alias: remoteAlias,
                status: "Error",
                error: addResult.error.message
              });
              continue;
            }
            var remoteStudent = Array.isArray(addResult.data) ? addResult.data[0] : addResult.data;
            if (remoteStudent && remoteStudent.id) {
              rememberGeneratedPin(remoteStudent.id, remotePin);
            }
            created += 1;
          }
          await loadRemoteDashboard();
        } else {
          var klassForImport = store.classes.find(function (item) { return item.id === classId; });
          if (!klassForImport) {
            state.message = "Error: Class not found.";
            render();
            return;
          }
          for (var j = 0; j < rows.length; j += 1) {
            var localAlias = uniqueAliasForImport(classId, rows[j].alias, reserved);
            var studentId = uid("student");
            var pin = generateStudentPin();
            store.students.push({
              id: studentId,
              classId: classId,
              teacherId: klassForImport.teacherId,
              firstName: "",
              lastName: "",
              alias: localAlias,
              pinHash: await hashText("student:" + studentId + ":" + pin),
              createdAt: new Date().toISOString()
            });
            rememberGeneratedPin(studentId, pin);
            created += 1;
          }
          saveStore();
        }
        state.studentImportClassId = classId;
        state.studentImportRows = failures;
        state.message = "Imported " + created + " students. Generated PINs are shown in the student list until this page reloads.";
        if (failures.length) state.message += " " + failures.length + " rows need attention.";
        render();
      }

      function operationOption(id) {
        return '<option value="' + id + '"' + (state.dashboardOperation === id ? " selected" : "") + '>' + escapeHTML(operationLabel(id)) + '</option>';
      }

      function tagOption(id, label) {
        return '<option value="' + id + '"' + (state.dashboardTag === id ? " selected" : "") + '>' + escapeHTML(label) + '</option>';
      }

      function sessionMatchesOperation(session, operation) {
        if (operation === "all") return true;
        return session.operation === operation || (session.tags || []).indexOf(operation) >= 0;
      }

      function filterSessions(sessions) {
        return sessions.filter(function (session) {
          var tags = session.tags || [];
          var operationOK = sessionMatchesOperation(session, state.dashboardOperation);
          var tagOK = state.dashboardTag === "all" || tags.indexOf(state.dashboardTag) >= 0 || (session.mistakes || []).some(function (m) {
            return (m.tags || []).indexOf(state.dashboardTag) >= 0;
          });
          return operationOK && tagOK;
        }).sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
      }

      function chartHTML(sessions, metric, title) {
        var w = 720;
        var h = 220;
        var pad = 34;
        var values = sessions.map(function (session) { return Number(session[metric]) || 0; });
        var maxValue = metric === "accuracy" ? 100 : Math.max(10, Math.max.apply(null, values));
        var minValue = 0;
        var points = values.map(function (value, index) {
          var x = sessions.length === 1 ? w / 2 : pad + (index * (w - pad * 2)) / (sessions.length - 1);
          var y = h - pad - ((value - minValue) / (maxValue - minValue || 1)) * (h - pad * 2);
          return [x, y, value, sessions[index]];
        });
        var poly = points.map(function (p) { return p[0].toFixed(1) + "," + p[1].toFixed(1); }).join(" ");
        return [
          '<div>',
          '  <div class="between"><strong>' + escapeHTML(title) + '</strong><span class="tiny muted">' + sessions.length + ' sessions</span></div>',
          '  <svg class="chart" viewBox="0 0 ' + w + ' ' + h + '" role="img" aria-label="' + escapeHTML(title) + '">',
          '    <line x1="' + pad + '" y1="' + (h - pad) + '" x2="' + (w - pad) + '" y2="' + (h - pad) + '" stroke="#d7deea" stroke-width="2"></line>',
          '    <line x1="' + pad + '" y1="' + pad + '" x2="' + pad + '" y2="' + (h - pad) + '" stroke="#d7deea" stroke-width="2"></line>',
          '    <polyline points="' + poly + '" fill="none" stroke="' + (metric === "accuracy" ? "#0f9f8f" : "#f05d4f") + '" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></polyline>',
          points.map(function (p) {
            return '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="6" fill="white" stroke="' + (metric === "accuracy" ? "#0f9f8f" : "#f05d4f") + '" stroke-width="4"><title>' + escapeHTML(studentNameForSession(p[3]) + " - " + p[2] + (metric === "accuracy" ? "%" : "")) + '</title></circle>';
          }).join(""),
          '    <text x="' + pad + '" y="24" fill="#64748b" font-size="14">' + maxValue + (metric === "accuracy" ? "%" : "") + '</text>',
          '    <text x="' + pad + '" y="' + (h - 8) + '" fill="#64748b" font-size="14">0</text>',
          '  </svg>',
          '</div>'
        ].join("");
      }

      function levelLabel(levelId) {
        var level = levelById(levelId);
        return level.id + ": " + level.name;
      }

      function levelOptions(selectedLevelId) {
        return LEVELS.map(function (level) {
          return '<option value="' + escapeHTML(level.id) + '"' + (selectedLevelId === level.id ? " selected" : "") + '>' + escapeHTML(levelLabel(level.id)) + '</option>';

      function sessionsForChallenge(studentId, levelId) {
        return sessionsForStudent(studentId).filter(function (session) {
          return session.levelId === levelId;
        }).sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
      }

      function scoreStats(sessions) {
        var ordered = sessions.slice().sort(function (a, b) {
          return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
        });
        var scores = ordered.map(function (session) {
          return Number(session.score) || 0;
        });
        if (!scores.length) return { initial: null, high: null, median: null };
        return {
          initial: scores[0],
          high: Math.max.apply(null, scores),
          median: median(scores)
        };
      }

      function formatScore(value) {
        if (value == null || !isFinite(value)) return "--";
        return Math.round(value) === value ? String(value) : value.toFixed(1);
      }

      function studentChallengeProgressPanel(studentId, levelId, title, framed, showHistoryError) {

        var level = levelById(levelId);

        var stats = scoreStats(sessions);
        return [
          useFrame ? '<section class="panel section stack">' : '<div class="stack">',
          '  <div class="between">',
          '    <div><h3>' + escapeHTML(title) + '</h3><p class="muted">' + escapeHTML(levelLabel(level.id)) + '</p></div>',

          statHTML("Median score", formatScore(stats.median)),
          statHTML("Latest score", sessions.length ? sessions[sessions.length - 1].score : "--"),
          '  </div>',
          sessions.length ? chartHTML(sessions, "score", "Score trend") : '<div class="empty">No saved sessions for this challenge yet.</div>',
          sessions.length ? chartHTML(sessions, "accuracy", "Accuracy trend") : '',

      function hydrateQRCodes() {
        var slots = document.querySelectorAll(".qr-slot[data-qr]");
        slots.forEach(function (slot) {
          var value = slot.getAttribute("data-qr");
          if (!value) return;
          if (!window.qrcode) {
            slot.innerHTML = '<span class="tiny muted">QR library unavailable</span>';
            return;
          }
          try {
            var qr = window.qrcode(0, "M");
            qr.addData(value);
            qr.make();
            slot.innerHTML = qr.createSvgTag(4, 1);
          } catch (error) {
            slot.innerHTML = '<span class="tiny muted">QR unavailable</span>';
          }
        });
      }

      function operationSummary(studentId) {
        var sessions = sessionsForStudent(studentId);
        if (!sessions.length) return '<span class="muted">No data yet</span>';
        return OPERATIONS.filter(function (op) { return op.id !== "mixed"; }).map(function (op) {
          var opSessions = sessions.filter(function (s) { return sessionMatchesOperation(s, op.id); });
          if (!opSessions.length) return '<span class="pill">' + escapeHTML(op.label) + ': --</span>';
          var accuracy = Math.round(avg(opSessions.map(function (s) { return s.accuracy; })));
          return '<span class="pill">' + escapeHTML(op.label) + ': ' + accuracy + '%</span>';
        }).join(" ");
      }

      function recentSessionsTable(sessions) {
        var recent = sessions.slice().sort(function (a, b) {
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        }).slice(0, 8);
        if (!recent.length) return '<div class="empty">Recent sessions will appear here.</div>';
        return [
          '<section class="panel section stack">',
          '  <h3>Recent activity</h3>',
          '  <table><thead><tr><th>Student</th><th>When</th><th>Level</th><th>Score</th><th>Accuracy</th><th>Mistakes</th></tr></thead><tbody>',
          recent.map(function (s) {
            return '<tr><td>' + escapeHTML(studentNameForSession(s)) + '<div class="tiny muted">' + escapeHTML(s.studentAlias) + '</div></td><td>' + formatDateTime(s.createdAt) + '</td><td>' + escapeHTML(s.levelId) + '</td><td>' + s.score + '</td><td>' + s.accuracy + '%</td><td>' + s.mistakes.length + '</td></tr>';
          }).join(""),
          '  </tbody></table>',
          '</section>'
        ].join("");
      }

      function lastSessionForStudent(studentId) {
        var sessions = sessionsForStudent(studentId).sort(function (a, b) {
          return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        });
        return sessions[0] || null;
      }

      function unique(items) {
        return Array.from(new Set(items.filter(Boolean)));
      }

      function avg(values) {
        if (!values.length) return 0;
        return values.reduce(function (sum, value) { return sum + Number(value || 0); }, 0) / values.length;
      }

      function median(values) {
        if (!values.length) return 0;
        var sorted = values.slice().map(function (value) {
          return Number(value) || 0;
        }).sort(function (a, b) {
          return a - b;
        });
        var middle = Math.floor(sorted.length / 2);
        if (sorted.length % 2) return sorted[middle];
        return (sorted[middle - 1] + sorted[middle]) / 2;
      }

      function studentNameForSession(session) {
        var student = studentsForClass(session.classId).find(function (item) {
          return item.id === session.studentId;
        });
        return student ? studentFullName(student) : session.studentAlias;
      }

      function messageHTML() {
        if (!state.message) return "";
        return '<div class="notice ' + (state.message.indexOf("Error:") === 0 ? "danger" : "success") + '">' + escapeHTML(state.message.replace(/^Error:\s*/, "")) + '</div>';
      }

      function exportCSV(classId) {
        var klass = store.classes.find(function (item) { return item.id === classId; });
        var sessions = sessionsForClass(classId);
        var rows = [
          ["student", "alias", "date", "mode", "operation", "level", "attempted", "correct", "accuracy", "best_streak", "time_spent_seconds", "mistakes"]
        ].concat(sessions.map(function (s) {
          return [studentNameForSession(s), s.studentAlias, s.createdAt, s.mode, s.operation, s.levelId, s.attempted, s.correct, s.accuracy, s.bestStreak, s.timeSpent, s.mistakes.length];
        }));
        var csv = rows.map(function (row) {
          return row.map(function (cell) {
            return '"' + String(cell == null ? "" : cell).replace(/"/g, '""') + '"';
          }).join(",");
        }).join("\n");
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = (klass ? klass.name.replace(/[^a-z0-9]+/gi, "-").toLowerCase() : "class") + "-fluency-sprint.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

        var button = event.target.closest("[data-action]");
        if (!button) return;
        var tag = button.tagName.toLowerCase();
        if (tag === "select") return;
        if (state.active && isAnswerControlAction(button.getAttribute("data-action")) && button === pointerHandledButton && Date.now() - pointerHandledAt < 700) {
          event.preventDefault();
          return;
        }
        event.preventDefault();
        handleAction(button);
      });

      document.addEventListener("pointerdown", function (event) {
        var button = event.target.closest('[data-action="keypad"], [data-action="backspace"], [data-action="clear-answer"], [data-action="submit-answer"]');
        if (button && state.active) {
          event.preventDefault();
          updateInputFromDom();
          pointerHandledButton = button;
          pointerHandledAt = Date.now();
          handleAction(button);
        }
      });

      document.addEventListener("keydown", function (event) {
        handlePhysicalAnswerKey(event);
      });

      document.addEventListener("change", function (event) {
        var fileInput = event.target.closest("input[data-import-file]");
        if (fileInput) {
          loadStudentImportFile(fileInput.files && fileInput.files[0]);
          return;
        }
        var select = event.target.closest("select[data-action]");
        if (!select) return;
        if (select.getAttribute("data-action") === "dashboard-operation") {
          state.dashboardOperation = select.value;
          render();
        }
        if (select.getAttribute("data-action") === "dashboard-tag") {
          state.dashboardTag = select.value;
          render();
        }
        if (select.getAttribute("data-action") === "dashboard-student") {
          state.dashboardStudentId = select.value;
          state.dashboardLevelId = null;
          render();
        }
        if (select.getAttribute("data-action") === "dashboard-level") {
          state.dashboardLevelId = select.value;
          render();
        }
        if (select.getAttribute("data-action") === "results-class") {
          state.dashboardClassId = select.value;
          state.resultsStudentId = null;
          state.resultsLevelId = null;
          saveStore();
          render();
        }
        if (select.getAttribute("data-action") === "results-student") {
          state.resultsStudentId = select.value;
          state.resultsLevelId = null;
          render();
        }
        if (select.getAttribute("data-action") === "results-level") {
          state.resultsLevelId = select.value;
          render();
        }
      });

      document.addEventListener("input", function (event) {
        if (event.target && event.target.id === "answerInput" && state.active) {
          var originalAnswer = event.target.value;
          var cleanedAnswer = sanitizeAnswerValue(originalAnswer);
          var cursorPosition = event.target.selectionStart;
          state.active.input = cleanedAnswer;
          if (cleanedAnswer !== originalAnswer) {
            event.target.value = cleanedAnswer;
            if (event.target.setSelectionRange) {
              var removedCharacters = originalAnswer.length - cleanedAnswer.length;
              var newPosition = cursorPosition == null ? cleanedAnswer.length : cursorPosition - removedCharacters;
              newPosition = Math.max(0, Math.min(newPosition, cleanedAnswer.length));
              event.target.setSelectionRange(newPosition, newPosition);
            }
          }
        }
      });

      function render() {
        if (state.view === "home") app.innerHTML = homeView();
        if (state.view === "preview") app.innerHTML = previewView();
        if (state.view === "appearance") app.innerHTML = appearanceView();
        if (state.view === "auth") app.innerHTML = authView();
        if (state.view === "student-join") app.innerHTML = studentJoinView();
        if (state.view === "student-menu") app.innerHTML = studentMenuView();
        if (state.view === "session") app.innerHTML = sessionView();
        if (state.view === "results") app.innerHTML = resultsView();
        if (state.view === "review") app.innerHTML = reviewView();
        if (state.view === "dashboard") app.innerHTML = dashboardView();
        if (state.view === "teacher-results") app.innerHTML = teacherResultsView();
        hydrateQRCodes();
      }

      applyAppearance();
      applyInitialRoute();
      render();
      initializeBackend().catch(function (error) {
        state.backendReady = true;
        state.message = "Error: Supabase setup needs attention: " + error.message;
        render();
      });
    })();
  </script>
</body>
</html>
